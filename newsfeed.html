<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>LiveSquawk Premium Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://www.livesquawk.com/partner_messenger/css/partner_messenger.css">
    
    <style>
        /* Modern typography import */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        /* Force box-sizing to prevent overflow/alignment issues */
        *, *:before, *:after { box-sizing: border-box; }
        
        body, .messenger__outer { transition: background 0.3s, color 0.3s; }
        /* CHANGED: Replaced #0f172a with #0A0A0A for dark background colors */
        body.dark, .dark .messenger__outer { background-color: #0A0A0a !important; color: #ffffff !important; }
        body.light, .light .messenger__outer { background-color: #ffffff !important; color: #000000 !important; }
        body.dark .messenger__outer, .dark .messenger__outer * { color: #e2e8f0 !important; }

        /* Unified Dark Theme Navigation */
        .top-nav { background: #0d1117; padding: 0 20px; height: 55px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1c2230; z-index: 1000; position: fixed; top: 0; left: 0; width: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .nav-links { display: flex; align-items: center; gap: 5px; }
        .nav-links a { color: #8b949e; text-decoration: none; margin-left: 15px; font-size: 13px; font-weight: 500; cursor: pointer; transition: color 0.2s; padding: 6px 12px; border-radius: 6px; }
        .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-links a.active { color: #2962ff; font-weight: 600; background: rgba(41, 98, 255, 0.1); }

        /* Dropdown Styling */
        .dropdown { position: relative; margin-left: 10px; }
        .dropbtn { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 18px; padding: 5px; transition: color 0.2s; }
        .dropbtn:hover { color: #fff; }
        .dropdown-content { display: none; position: absolute; right: 0; top: 35px; background-color: #161b22; min-width: 160px; border: 1px solid #30363d; z-index: 1000; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); overflow: hidden; }
        .dropdown-content a { color: #c9d1d9; padding: 10px 16px; text-decoration: none; display: block; font-size: 13px; cursor: pointer; transition: background 0.15s; margin: 0; border-radius: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .dropdown-content a:hover { background-color: #21262d; color: #fff; }

        /* Newsfeed Content Styles */
        body { margin: 0; padding-top: 55px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .messenger__outer { flex-grow: 1; overflow: hidden; }
        .messenger__outer .newsfeed__title { display: none !important; }
        .custom-newsfeed-header { display: flex; align-items: center; padding: 15px 0 15px 165px; font-family: 'Inter', system-ui, sans-serif; font-weight: 700; text-transform: uppercase; font-size: 16px; }
        .green-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; margin-right: 12px; }

        /* CHANGED: Replaced #0f172a with #0A0A0A */
        .controls { display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 10px; align-items: center; flex-wrap: wrap; padding: 10px; background: #0A0A0a; }
        .filter-btn { padding: 5px 10px; cursor: pointer; border-radius: 4px; border: 1px solid #475569; background: #1e293b; color: white; }
        .filter-btn.active { background: #00b4f9; border-color: #00b4f9; }
        #searchBar { padding: 5px 10px; border-radius: 4px; border: 1px solid #475569; }
        
        .audio-container { display: flex; align-items: center; gap: 10px; margin-right: auto; }
        .audio-container img { height: 30px; width: auto; }
        /* CHANGED: Replaced #0f172a with #0A0A0A */
        .audio-wrapper { display: flex; align-items: center; gap: 15px; border: 1px solid #00b4f9; padding: 6px 14px; border-radius: 8px; background: #0A0A0a; }
        #audioToggle { cursor: pointer; background: none; border: none; color: #f8fafc; font-weight: 500; display: flex; align-items: center; gap: 8px; min-width: 190px; }
        .status-on { color: #22c55e !important; }

        .vol-slider { -webkit-appearance: none; width: 80px; height: 6px; background: #334155; border-radius: 3px; outline: none; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #00b4f9; border-radius: 50%; cursor: pointer; transition: background 0.2s; }
        .vol-slider::-webkit-slider-thumb:hover { background: #ffffff; }

        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: "🌙"; font-size: 12px; display: flex; align-items: center; justify-content: center; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00b4f9; }
        input:checked + .slider:before { transform: translateX(26px); content: "☀️"; }
    </style>
</head>
<body class="dark">

    <div class="top-nav">
       <div style="height: 50px; display: flex; align-items: center;">
            <img src="assets/logo.png" alt="Analyst Wire" style="height: 35px;">
       </div>
       <div class="nav-links">
            <a href="terminal.html">Dashboard</a>
            <a href="/newsfeed" class="active">Newsfeed</a>
            <a id="nav-key-levels" href="key-levels.html" style="display: none;">Key Levels</a>
    <a href="analysis.html" style="display: none;">Analysis</a>
            <a id="nav-courses" href="courses.html" style="display: none;">Courses</a>
            
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleDropdown()">⚙️</button>
                <div id="settingsDropdown" class="dropdown-content">
                    <a href="account.html">Account</a>
                    <a id="nav-admin" style="display: none;" href="admin.html">Admin</a>
                    <a id="nav-upload" style="display: none;" href="admin_upload.html">Upload Data</a>
                    <a id="logoutBtn" style="color: #f85149; cursor: pointer;">Logout</a>
                </div>
            </div>
       </div>
    </div>

    <div class="controls" style="margin-top: 10px;">
        <div class="audio-container">
            <img src="media/squawkimage.png" alt="Logo" />
            <div class="audio-wrapper">
                <button id="audioToggle" onclick="handleAudioToggle()">🔊 <span id="audioLabel">Disconnected</span> <span id="timerText"></span></button>
                <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.1" value="1" title="Volume">
            </div>
        </div>
        
        <input type="text" id="searchBar" placeholder="Search keywords..." onkeyup="filterFeed()">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('commodities', this)">Commodities</button>
        <button class="filter-btn" onclick="setFilter('forex', this)">Forex</button>
        <button class="filter-btn" onclick="setFilter('equities', this)">Equities</button>
        <button class="filter-btn" onclick="setFilter('crypto', this)">Crypto</button>
        <button class="filter-btn" onclick="setFilter('centralBanks', this)">Central Banks</button>
        <label class="switch">
            <input type="checkbox" id="themeToggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="custom-newsfeed-header"><div class="green-dot"></div> NEWSFEED</div>
    <div class="messenger__outer" id="livesquawk_messenger_outer"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // --- AUTH & PERMISSION CHECK ---
        const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

        async function init() {
            const { data: { session } } = await client.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            
            const { data: profile } = await client.from('profiles').select('is_admin, subscription_tag').eq('id', session.user.id).single();
            const allowedTags = ['pro', 'newsfeed', 'squawk'];
            
            if (!profile || (profile.is_admin !== true && !allowedTags.includes(profile.subscription_tag))) {
                alert("Your subscription does not include access to this page.");
                await client.auth.signOut();
                window.location.href = 'index.html';
                return;
            }

            if (profile) {
                if (profile.is_admin === true) {
                    document.getElementById('nav-admin').style.display = 'block';
                    document.getElementById('nav-upload').style.display = 'block';
                }
                if (profile.is_admin === true || profile.subscription_tag === 'pro') {
                    document.getElementById('nav-courses').style.display = 'block';
                    document.getElementById('nav-key-levels').style.display = 'block';
                }
            }
        }

        function toggleDropdown() { document.getElementById("settingsDropdown").style.display = (document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block"); }
        window.onclick = function(event) { if (!event.target.matches('.dropbtn')) document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none'); }
        document.getElementById('logoutBtn').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'index.html'; });

        // --- AUDIO ENGINE ---
        let audioEnabled = false, seconds = 0, timerInterval;
        let audioCtx = null; // Global Web Audio Context
        
        function initAudioContext() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSynthesizedPing(volumeLevel) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            
            // Apply volume slider value and create a quick fade-out
            gainNode.gain.setValueAtTime(volumeLevel * 0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        function startTimer() { timerInterval = setInterval(() => { seconds++; const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60; document.getElementById('timerText').innerText = `(${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')})`; }, 1000); }
        function speakText(text) { if (!audioEnabled) return; const u = new SpeechSynthesisUtterance(text); u.volume = document.getElementById('volSlider').value; window.speechSynthesis.speak(u); }
        
        async function handleAudioToggle() {
            const btn = document.getElementById('audioToggle');
            const lbl = document.getElementById('audioLabel');
            btn.disabled = true;
            
            if (audioEnabled) { 
                lbl.innerText = "Disconnecting..."; 
                lbl.classList.remove('status-on'); 
                await new Promise(r => setTimeout(r, 800)); 
                clearInterval(timerInterval); 
                audioEnabled = false; 
                lbl.innerText = "Disconnected"; 
                document.getElementById('timerText').innerText = ""; 
            } else { 
                lbl.innerText = "Connecting..."; 
                
                // Initialize the Web Audio API on explicit user click to satisfy browser policies
                initAudioContext();

                await new Promise(r => setTimeout(r, 800)); 
                audioEnabled = true; 
                seconds = 0; 
                startTimer(); 
                lbl.innerText = "On Air"; 
                lbl.classList.add('status-on'); 
            }
            btn.disabled = false;
        }

        // --- FILTER LOGIC ---
        let currentFilter = 'all';
        const filters = { commodities: ['oil', 'gold', 'metal', 'copper', 'gas', 'brent', 'wti', 'silver'], forex: ['usd', 'eur', 'jpy', 'gbp', 'fx', 'forex', 'currency', 'yield'], equities: ['stock', 'equity', 'sp500', 'nasdaq', 'dow', 'nikkei', 'shares'], crypto: ['bitcoin', 'btc', 'ethereum', 'eth', 'crypto', 'coin'], centralBanks: ['fed', 'ecb', 'boj', 'bank of england', 'rba', 'central bank', 'interest rate', 'hike', 'cut'] };
        const audioTriggerKeywords = ['hike', 'cut', 'pause', 'pivot', 'fed', 'ecb', 'boe', 'boj', 'tariff', 'sanctions', 'stimulus', 'buyout', 'merger', 'yield', 'opec', 'sec', 'etf', 'S&P Global Manufacturing', 'ISM Manufacturing', 'CPI', 'JOLTS', 'ADP', 'S&P Global Services', 'ISM Non-Manufacturing', 'Crude Oil Inventories', 'Initial Jobless Claims', 'New Home Sales', 'Average Hourly Earnings', 'Nonfarm Payrolls', 'Unemployment Rate', 'GDP', 'Core CPI', 'BoC Interest Rate Decision', 'BoJ Interest Rate Decision', 'Fed Interest Rate Decision', 'SNB Interest Rate Decision', 'BoE Interest Rate Decision', 'Retail Sales', 'Core Retail Sales', 'RBA Interest Rate Decision', 'Core PCE Price Index', 'Durable Goods Orders', 'Philadelphia Fed Manufacturing Index', '10-Year Note Auction', 'ECB Interest Rate Decision', 'PPI', 'German CPI', 'Manufacturing PMI', 'CB Consumer Confidence', 'Chicago PMI', 'HCOB Spain Manufacturing PMI', 'Yield Rises', 'Treasury Falls', 'Rate-Hike', 'Monetary Policy', 'Military Strikes', 'Missile Attack', 'Revokes', 'WTI Oil Jumps', 'Gold', 'Australia', 'AUD', 'US Military', 'Central Command', 'USA'];
        
        function setFilter(type, btn) { currentFilter = type; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); if(btn) btn.classList.add('active'); filterFeed(); }
        function filterFeed() { const query = document.getElementById('searchBar').value.toLowerCase(); document.querySelectorAll('.news__item__outer').forEach(item => { const text = item.innerText.toLowerCase(); const matchesCategory = (currentFilter === 'all' || filters[currentFilter].some(word => text.includes(word))); const matchesSearch = text.includes(query); item.style.display = (matchesCategory && matchesSearch) ? '' : 'none'; }); }
        
        window.messenger_start_init = function() { if (typeof Messenger !== 'undefined') Messenger.init({ container: '#livesquawk_messenger_outer', product: 'forexanalytic' }); };
        document.getElementById('themeToggle').addEventListener('change', () => { document.body.classList.toggle('dark'); document.body.classList.toggle('light'); });
        
        const feedContainer = document.getElementById('livesquawk_messenger_outer');
        
        // --- MUTATION OBSERVER (ALERT LOGIC) ---
        new MutationObserver((mutations) => { 
            mutations.forEach(m => m.addedNodes.forEach(node => { 
                if (node.classList && node.classList.contains('news__item__outer')) { 
                    
                    if (audioEnabled) {
                        const rawText = node.innerText;
                        const lowerText = rawText.toLowerCase();
                        
                        // Check if the headline matches any of our priority keywords
                        const hasKeyword = audioTriggerKeywords.some(kw => lowerText.includes(kw.toLowerCase()));
                        
                        if (hasKeyword) {
                            // Option A: If it has a keyword, read the text out loud
                            speakText(rawText); 
                        } else {
                            // Option B: If no keyword, play the short electronic ping
                            const vol = parseFloat(document.getElementById('volSlider').value);
                            playSynthesizedPing(vol);
                        }
                    }
                } 
            })); 
        }).observe(feedContainer, { childList: true, subtree: true });
        
        Object.defineProperty(window, 'self', { get: () => window.top });
        window.addEventListener('load', () => { const height = document.body.scrollHeight; window.parent.postMessage({ height }, '*'); });
        
        init();
    </script>
    <script src="https://www.livesquawk.com/partner_messenger/js/include_forexanalytic.js?v=3"></script>
</body>
</html>
