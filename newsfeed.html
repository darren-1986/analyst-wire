<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LiveSquawk Premium Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://www.livesquawk.com/partner_messenger/css/partner_messenger.css">
    
    <style>
        /* Base Styling & Sticky Nav */
        body { margin: 0; padding-top: 50px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .messenger__outer { transition: background 0.3s, color 0.3s; flex-grow: 1; }
        
        /* Fixed Navigation */
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: #131722; padding: 0 20px; height: 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2e39; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #787b86; text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
        .nav-links a:hover { color: #d1d4dc; }
        .nav-links a.active { color: #2962ff; font-weight: bold; }

        /* Dropdown Styling */
        .dropdown { position: relative; margin-left: 20px; }
        .dropbtn { background: none; border: none; color: #787b86; cursor: pointer; font-size: 18px; padding: 5px; }
        .dropbtn:hover { color: #fff; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1c2230; min-width: 150px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); border: 1px solid #2a2e39; z-index: 1000; border-radius: 4px; }
        .dropdown-content a { color: #d1d4dc; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; margin: 0; cursor: pointer; }
        .dropdown-content a:hover { background-color: #2a2e39; }

        /* Newsfeed Content Styles */
        body.dark, body.dark .messenger__outer { background-color: #0f172a !important; color: #ffffff !important; }
        body.light, body.light .messenger__outer { background-color: #ffffff !important; color: #000000 !important; }
        body.dark .messenger__outer, body.dark .messenger__outer * { color: #e2e8f0 !important; }

        .messenger__outer .newsfeed__title { display: none !important; }
        .custom-newsfeed-header { display: flex; align-items: center; padding: 15px 0 15px 165px; font-family: 'Inter', system-ui, sans-serif; font-weight: 700; text-transform: uppercase; font-size: 16px; }
        .green-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; margin-right: 12px; }

        .controls { display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 10px; align-items: center; flex-wrap: wrap; padding: 10px; background: #0f172a; }
        .filter-btn { padding: 5px 10px; cursor: pointer; border-radius: 4px; border: 1px solid #475569; background: #1e293b; color: white; }
        .filter-btn.active { background: #00b4f9; border-color: #00b4f9; }
        #searchBar { padding: 5px 10px; border-radius: 4px; border: 1px solid #475569; }
        
        .audio-container { display: flex; align-items: center; gap: 10px; margin-right: auto; }
        .audio-container img { height: 30px; width: auto; }
        .audio-wrapper { display: flex; align-items: center; gap: 15px; border: 1px solid #00b4f9; padding: 6px 14px; border-radius: 8px; background: #0f172a; }
        #audioToggle { cursor: pointer; background: none; border: none; color: #f8fafc; font-weight: 500; display: flex; align-items: center; gap: 8px; min-width: 190px; }
        .status-on { color: #22c55e !important; }

        .vol-slider { -webkit-appearance: none; width: 80px; height: 6px; background: #334155; border-radius: 3px; outline: none; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #00b4f9; border-radius: 50%; cursor: pointer; transition: background 0.2s; }
        .vol-slider::-webkit-slider-thumb:hover { background: #ffffff; }

        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: "🌙"; font-size: 12px; display: flex; align-items: center; justify-content: center; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00b4f9; }
        input:checked + .slider:before { transform: translateX(26px); content: "☀️"; }
    </style>
</head>
<body class="dark">

    <div class="top-nav">
       <div style="height: 50px; display: flex; align-items: center; justify-content: center; box-sizing: border-box; padding: 5px 0;">
           <img src="assets/logo.png" alt="Analyst Wire" style="height: 40px; width: auto; object-fit: contain; display: block;">
       </div>
       <div class="nav-links">
           <a href="terminal.html">Dashboard</a>
           <a href="/newsfeed" class="active">Newsfeed</a>
           <a id="nav-courses" href="courses.html" style="display: none;">Courses</a>
           
           <div class="dropdown">
               <button class="dropbtn" onclick="toggleDropdown()">⚙️</button>
               <div id="settingsDropdown" class="dropdown-content">
                   <a href="account.html">Account</a>
                   <a id="nav-admin" style="display: none;" href="admin.html">Admin</a>
                   <a id="logoutBtn" style="color: #f23645; cursor: pointer;">Logout</a>
               </div>
           </div>
       </div>
    </div>

    <div class="controls">
        <div class="audio-container">
            <img src="media/squawkimage.png" alt="Logo" />
            <div class="audio-wrapper">
                <button id="audioToggle" onclick="handleAudioToggle()">🔊 <span id="audioLabel">Disconnected</span> <span id="timerText"></span></button>
                <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.1" value="1" title="Volume">
            </div>
        </div>
        
        <input type="text" id="searchBar" placeholder="Search keywords..." onkeyup="filterFeed()">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('commodities', this)">Commodities</button>
        <button class="filter-btn" onclick="setFilter('forex', this)">Forex</button>
        <button class="filter-btn" onclick="setFilter('equities', this)">Equities</button>
        <button class="filter-btn" onclick="setFilter('crypto', this)">Crypto</button>
        <button class="filter-btn" onclick="setFilter('centralBanks', this)">Central Banks</button>
        <label class="switch">
            <input type="checkbox" id="themeToggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="custom-newsfeed-header"><div class="green-dot"></div> NEWSFEED</div>
    <div class="messenger__outer" id="livesquawk_messenger_outer"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // --- AUTH & PERMISSION CHECK ---
        const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

        async function init() {
            const { data: { session } } = await client.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            
            const { data: profile } = await client.from('profiles').select('is_admin, subscription_tag').eq('id', session.user.id).single();
            if (profile) {
                // Access Check
                const allowedTags = ['pro', 'newsfeed', 'squawk'];
                if (profile.is_admin !== true && !allowedTags.includes(profile.subscription_tag)) {
                    window.location.href = 'terminal.html'; return;
                }
                // Menu visibility
                if (profile.is_admin === true) document.getElementById('nav-admin').style.display = 'block';
                if (profile.is_admin === true || profile.subscription_tag === 'pro') document.getElementById('nav-courses').style.display = 'block';
            }
        }

        // --- NAVIGATION & DROPDOWN ---
        function toggleDropdown() { document.getElementById("settingsDropdown").style.display = (document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block"); }
        window.onclick = function(event) { if (!event.target.matches('.dropbtn')) document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none'); }
        document.getElementById('logoutBtn').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'index.html'; });

        // --- LIVESQUAWK & FILTER LOGIC (Unchanged) ---
        let audioEnabled = false, seconds = 0, timerInterval;
        function startTimer() { timerInterval = setInterval(() => { seconds++; const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60; document.getElementById('timerText').innerText = `(${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')})`; }, 1000); }
        function speakText(text) { if (!audioEnabled) return; const u = new SpeechSynthesisUtterance(text); u.volume = document.getElementById('volSlider').value; window.speechSynthesis.speak(u); }
        async function handleAudioToggle() {
            const btn = document.getElementById('audioToggle'), lbl = document.getElementById('audioLabel');
            btn.disabled = true;
            if (audioEnabled) { lbl.innerText = "Disconnecting..."; lbl.classList.remove('status-on'); await new Promise(r => setTimeout(r, 800)); clearInterval(timerInterval); audioEnabled = false; lbl.innerText = "Disconnected"; document.getElementById('timerText').innerText = ""; }
            else { lbl.innerText = "Connecting..."; await new Promise(r => setTimeout(r, 800)); audioEnabled = true; seconds = 0; startTimer(); lbl.innerText = "On Air"; lbl.classList.add('status-on'); }
            btn.disabled = false;
        }

        let currentFilter = 'all';
        const filters = { commodities: ['oil', 'gold', 'metal', 'copper', 'gas', 'brent', 'wti', 'silver'], forex: ['usd', 'eur', 'jpy', 'gbp', 'fx', 'forex', 'currency', 'yield'], equities: ['stock', 'equity', 'sp500', 'nasdaq', 'dow', 'nikkei', 'shares'], crypto: ['bitcoin', 'btc', 'ethereum', 'eth', 'crypto', 'coin'], centralBanks: ['fed', 'ecb', 'boj', 'bank of england', 'rba', 'central bank', 'interest rate', 'hike', 'cut'] };
        const audioTriggerKeywords = ['hike', 'cut', 'pause', 'pivot', 'fed', 'ecb', 'boe', 'boj', 'tariff', 'sanctions', 'stimulus', 'buyout', 'merger', 'yield', 'opec', 'sec', 'etf', 'S&P Global Manufacturing', 'ISM Manufacturing', 'CPI', 'JOLTS', 'ADP', 'S&P Global Services', 'ISM Non-Manufacturing', 'Crude Oil Inventories', 'Initial Jobless Claims', 'New Home Sales', 'Average Hourly Earnings', 'Nonfarm Payrolls', 'Unemployment Rate', 'GDP', 'Core CPI', 'BoC Interest Rate Decision', 'BoJ Interest Rate Decision', 'Fed Interest Rate Decision', 'SNB Interest Rate Decision', 'BoE Interest Rate Decision', 'Retail Sales', 'Core Retail Sales', 'RBA Interest Rate Decision', 'Core PCE Price Index', 'Durable Goods Orders', 'Philadelphia Fed Manufacturing Index', '10-Year Note Auction', 'ECB Interest Rate Decision', 'PPI', 'German CPI', 'Manufacturing PMI', 'CB Consumer Confidence', 'Chicago PMI', 'HCOB Spain Manufacturing PMI'];
        function setFilter(type, btn) { currentFilter = type; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); if(btn) btn.classList.add('active'); filterFeed(); }
        function filterFeed() { const query = document.getElementById('searchBar').value.toLowerCase(); document.querySelectorAll('.news__item__outer').forEach(item => { const text = item.innerText.toLowerCase(); const matchesCategory = (currentFilter === 'all' || filters[currentFilter].some(word => text.includes(word))); const matchesSearch = text.includes(query); item.style.display = (matchesCategory && matchesSearch) ? '' : 'none'; }); }
        
        window.messenger_start_init = function() { if (typeof Messenger !== 'undefined') Messenger.init({ container: '#livesquawk_messenger_outer', product: 'forexanalytic' }); };
        document.getElementById('themeToggle').addEventListener('change', () => { document.body.classList.toggle('dark'); document.body.classList.toggle('light'); });
        
        const feedContainer = document.getElementById('livesquawk_messenger_outer');
        new MutationObserver((mutations) => { mutations.forEach(m => m.addedNodes.forEach(node => { if (node.classList && node.classList.contains('news__item__outer')) { if (audioTriggerKeywords.some(kw => node.innerText.toLowerCase().includes(kw.toLowerCase()))) speakText(node.innerText); } })); }).observe(feedContainer, { childList: true, subtree: true });
        
        Object.defineProperty(window, 'self', { get: () => window.top });
        window.addEventListener('load', () => { const height = document.body.scrollHeight; window.parent.postMessage({ height }, '*'); });
        
        init();
    </script>
    <script src="https://www.livesquawk.com/partner_messenger/js/include_forexanalytic.js?v=3"></script>
</body>
</html>
