<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyst Wire | Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000000; color: #d1d4dc; margin: 0; min-height: 100vh; }
        
        /* Top Navigation */
        .top-nav { background: #131722; padding: 0 20px; height: 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2e39; position: relative; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #787b86; text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
        .nav-links a:hover { color: #d1d4dc; }
        .nav-links a.active { color: #2962ff; font-weight: bold; }

        /* Dropdown Styling */
        .dropdown { position: relative; margin-left: 20px; }
        .dropbtn { background: none; border: none; color: #787b86; cursor: pointer; font-size: 18px; padding: 5px; }
        .dropbtn:hover { color: #fff; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1c2230; min-width: 150px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); border: 1px solid #2a2e39; z-index: 1000; border-radius: 4px; }
        .dropdown-content a { color: #d1d4dc; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; margin: 0; cursor: pointer; }
        .dropdown-content a:hover { background-color: #2a2e39; }

        /* Account UI */
        .account-container { max-width: 600px; margin: 40px auto; background: #131722; padding: 30px; border-radius: 8px; border: 1px solid #2a2e39; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .info-group { margin-bottom: 15px; }
        .info-label { font-size: 11px; color: #787b86; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .info-value { font-size: 15px; color: #fff; background: #1c2230; padding: 12px; border-radius: 4px; border: 1px solid #2a2e39; }
        
        .pwd-input { width: 100%; padding: 12px; margin-bottom: 15px; background: #1c2230; border: 1px solid #2a2e39; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn-update { background: #2962ff; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; width: 100%; }
        .btn-secondary { background: #333; margin-top: 10px; }
        
        .badge { color: white; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-active { background: #089981; }
        .badge-canceled { background: #f23645; }
    </style>
</head>
<body>

<div class="top-nav">
    <div style="height: 50px; display: flex; align-items: center; justify-content: center; box-sizing: border-box; padding: 5px 0;">
        <img src="assets/logo.png" alt="Analyst Wire" style="height: 40px; width: auto; object-fit: contain; display: block;">
    </div>
    <div class="nav-links">
        <a href="terminal.html">Dashboard</a>
        <a href="/newsfeed">Newsfeed</a>
        <a id="nav-courses" href="courses.html" style="display: none;">Courses</a>
        <a id="nav-key-levels" href="key-levels.html" style="display: none;">Key Levels</a>
        
        <div class="dropdown">
            <button class="dropbtn" onclick="toggleDropdown()">⚙️</button>
            <div id="settingsDropdown" class="dropdown-content">
                <a href="account.html" style="color:#2962ff;">Account</a>
                <a id="nav-admin" style="display: none;" href="admin.html">Admin</a>
                <a id="logoutBtn" style="color: #f23645; cursor: pointer;">Logout</a>
            </div>
        </div>
    </div>
</div>

<div class="account-container">
    <h2>Subscription Details</h2>
    <div class="info-grid">
        <div class="info-group"><div class="info-label">Member Name</div><div class="info-value" id="user-name">Loading...</div></div>
        <div class="info-group"><div class="info-label">Account Email</div><div class="info-value" id="user-email">Loading...</div></div>
    </div>
    <div class="info-grid">
        <div class="info-group"><div class="info-label">Plan Type</div><div class="info-value" id="sub-type">Loading...</div></div>
        <div class="info-group"><div class="info-label">Status</div><div class="info-value" style="border:none; background: transparent; padding: 8px 0;"><span class="badge" id="sub-status">Loading...</span></div></div>
        <div class="info-group"><div class="info-label">Subscription Price</div><div class="info-value" id="sub-price">Syncing...</div></div>
        <div class="info-group"><div class="info-label">Next Billing Date</div><div class="info-value" id="sub-date">Syncing...</div></div>
    </div>
    <button class="btn-update btn-secondary" id="manage-sub">Manage Subscription via Stripe</button>
    
    <h3>Security & Login</h3>
    <input type="password" id="new-password" class="pwd-input" placeholder="New password">
    <input type="password" id="confirm-password" class="pwd-input" placeholder="Confirm password">
    <button class="btn-update" id="updatePwdBtn">Save New Password</button>
    <p id="pwd-status"></p>
</div>

<script>
    function toggleDropdown() {
        document.getElementById("settingsDropdown").style.display = 
            document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block";
    }

    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'YOUR_SUPABASE_KEY');
    
    async function init() {
        // 1. Session check
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'index.html'; return; }
        
        document.getElementById('user-email').innerText = session.user.email;
        const { data: profile } = await client.from('profiles').select('*').eq('id', session.user.id).single();
        
        if (profile) {
            // Menu Visibility Logic
            if (profile.is_admin === true) document.getElementById('nav-admin').style.display = 'block';
            
            // Show Courses and Key Levels for Pro/Admin
            if (profile.is_admin === true || profile.subscription_tag === 'pro') {
                document.getElementById('nav-courses').style.display = 'block';
                document.getElementById('nav-key-levels').style.display = 'block';
            }

            // Profile Data
            document.getElementById('user-name').innerText = profile.full_name || 'N/A';
            document.getElementById('sub-type').innerText = (profile.subscription_tag || 'FREE').toUpperCase();
            
            const statusStr = (profile.stripe_status || profile.status || 'Active').toUpperCase();
            const statusEl = document.getElementById('sub-status');
            statusEl.innerText = statusStr;
            statusEl.className = statusStr === 'ACTIVE' ? 'badge badge-active' : 'badge badge-canceled';
            
            document.getElementById('sub-price').innerText = profile.plan_price ? `$${profile.plan_price}/mo` : 'N/A';
            
            // Robust Date Parsing
            if (profile.current_period_end) {
                const val = profile.current_period_end;
                const dateObj = typeof val === 'number' ? new Date(val * 1000) : new Date(val);
                
                if (!isNaN(dateObj.getTime())) {
                    document.getElementById('sub-date').innerText = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                } else {
                    document.getElementById('sub-date').innerText = 'N/A';
                }
            } else {
                document.getElementById('sub-date').innerText = 'N/A';
            }
        }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'index.html'; });
    document.getElementById('manage-sub').addEventListener('click', () => window.open('https://billing.stripe.com/p/login/test_dRmcN58656TOaojaZf9fW00', '_blank'));

    document.getElementById('updatePwdBtn').addEventListener('click', async () => {
        const newPwd = document.getElementById('new-password').value;
        const confirmPwd = document.getElementById('confirm-password').value;
        const statusText = document.getElementById('pwd-status');
        if (newPwd.length < 6) { statusText.innerText = 'Password too short'; return; }
        if (newPwd !== confirmPwd) { statusText.innerText = 'Passwords do not match'; return; }
        const { error } = await client.auth.updateUser({ password: newPwd });
        statusText.innerText = error ? 'Error: ' + error.message : 'Password updated!';
    });

    init();
</script>
</body>
</html>
