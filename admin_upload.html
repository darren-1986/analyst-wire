<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>Analyst Wire | Admin Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background: #0f1115; color: white; font-family: sans-serif; margin: 0; }
        
        /* Admin Navigation Styles */
        .top-nav { background: #1c2230; padding: 15px 20px; display: flex; gap: 20px; border-bottom: 2px solid #2a2e39; align-items: center; }
        .top-nav button, .top-nav a { background: none; border: none; color: #787b86; cursor: pointer; font-size: 1rem; text-decoration: none; font-weight: bold; }
        .top-nav button:hover, .top-nav a:hover { color: #fff; }
        .top-nav .active { color: #2962ff; }
        
        /* Container Styles */
        .upload-container { max-width: 600px; margin: 40px auto; background: #1a1d23; padding: 25px; border-radius: 8px; border: 1px solid #333; }
        
        /* Tab Styles */
        .tabs-header { display: flex; border-bottom: 1px solid #333; margin-bottom: 20px; overflow-x: auto; }
        .tab-button { background: none; border: none; color: #787b86; padding: 10px 15px; cursor: pointer; font-size: 15px; border-bottom: 2px solid transparent; transition: all 0.3s; white-space: nowrap; }
        .tab-button:hover { color: #fff; }
        .tab-button.active { color: #2962ff; border-bottom: 2px solid #2962ff; font-weight: bold; }
        
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        /* Form Styles */
        input[type="file"], input[type="date"] { margin: 15px 0; display: block; width: 100%; padding: 8px; background: #1a1d23; color: white; border: 1px solid #333; box-sizing: border-box; }
        button.action-btn { background: #2962ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button.action-btn:hover { background: #1e4bd8; }
        .status-msg { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="admin.html">Users</a>
    <a href="admin.html">Revenue</a>
    <a href="terminal.html">Terminal</a>
    <a href="admin_upload.html" class="active">Upload Data</a>
    <button id="logoutBtn">Logout</button>
</div>

<div class="upload-container">
    <div class="tabs-header">
        <button class="tab-button active" onclick="switchTab(event, 'tab-key-levels')">Key Levels</button>
        <button class="tab-button" onclick="switchTab(event, 'tab-project-2')">Section 2</button>
        <button class="tab-button" onclick="switchTab(event, 'tab-project-3')">Section 3</button>
        <button class="tab-button" onclick="switchTab(event, 'tab-project-4')">Section 4</button>
        <button class="tab-button" onclick="switchTab(event, 'tab-project-5')">Section 5</button>
    </div>

    <div id="tab-key-levels" class="tab-pane active">
        <h2>Upload Key Levels</h2>
        <label>Select Date:</label>
        <input type="date" id="upload-date">
        <input type="file" id="csvFile" accept=".csv" />
        <button id="upload-btn" class="action-btn" onclick="processUpload()">Upload & Replace Data</button>
        <div id="status" class="status-msg"></div>
    </div>

    <div id="tab-project-2" class="tab-pane">
        <h2>Section 2</h2>
        <p style="color: #787b86;">Future upload tools will go here.</p>
    </div>

    <div id="tab-project-3" class="tab-pane">
        <h2>Section 3</h2>
        <p style="color: #787b86;">Future upload tools will go here.</p>
    </div>

    <div id="tab-project-4" class="tab-pane">
        <h2>Section 4</h2>
        <p style="color: #787b86;">Future upload tools will go here.</p>
    </div>

    <div id="tab-project-5" class="tab-pane">
        <h2>Section 5</h2>
        <p style="color: #787b86;">Future upload tools will go here.</p>
    </div>
</div>

<script>
    // Tab Switching Logic
    function switchTab(evt, tabId) {
        // Hide all panes
        const tabPanes = document.querySelectorAll('.tab-pane');
        tabPanes.forEach(pane => pane.classList.remove('active'));
        
        // Remove active state from all buttons
        const tabButtons = document.querySelectorAll('.tab-button');
        tabButtons.forEach(btn => btn.classList.remove('active'));
        
        // Show the target pane and set button as active
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    // --- Original Logic Below ---

    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

    document.getElementById('logoutBtn').addEventListener('click', async () => { 
        await client.auth.signOut(); 
        window.location.href = 'index.html'; 
    });

    // Enhanced extraction function to isolate stacked levels (S1 vs S2) precisely
    function parseStackedLevel(text, label) {
        if (!text) return 0;
        const regex = new RegExp(`${label}:\\s*([\\d\\.]+)`, 'i');
        const match = text.match(regex);
        return match ? parseFloat(match[1]) : 0;
    }

    async function processUpload() {
        const file = document.getElementById('csvFile').files[0];
        const date = document.getElementById('upload-date').value;
        if (!file || !date) return alert("Select file AND date.");

        Papa.parse(file, {
            header: false,
            skipEmptyLines: true,
            complete: async (results) => {
                await client.from('key_levels').delete().eq('trade_date', date);

                const cleanData = results.data.slice(1).filter(r => Array.isArray(r) && r[0]).map(row => {
                    const rawSupportText = row[2] || '';
                    const rawResistanceText = row[3] || '';
                    
                    const s1 = parseStackedLevel(rawSupportText, 'S1');
                    const s2 = parseStackedLevel(rawSupportText, 'S2');
                    const r1 = parseStackedLevel(rawResistanceText, 'R1');
                    const r2 = parseStackedLevel(rawResistanceText, 'R2');
                    
                    const bbl = parseFloat(row[4]) || 0;
                    
                    // Pulling directly from your new pre-calculated spreadsheet format columns
                    const sheetBias = row[1] ? row[1].trim() : 'Neutral';
                    const lollipopText = row[11] ? row[11].trim() : 'Inside Range';
                    const analysisText = row[12] ? row[12].trim() : '';

                    return {
                        ticker: row[0].trim(),
                        s1: s1,
                        s2: s2, 
                        r1: r1,
                        r2: r2,
                        bias: sheetBias, 
                        bull_bear_line: bbl,
                        lollipop: lollipopText, // Populates your newly initialized table field
                        analysis: analysisText,   // Populates your newly initialized analysis field
                        trade_date: date
                    };
                });

                const { error } = await client.from('key_levels').insert(cleanData);
                document.getElementById('status').innerText = error ? "Error: " + error.message : "Success! Complete multi-asset key levels matrix uploaded cleanly.";
            }
        });
    }
</script>
</body>
</html>
