<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyst Wire | Admin Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background: #0f1115; color: white; padding: 40px; font-family: sans-serif; }
        .upload-container { max-width: 500px; background: #1a1d23; padding: 25px; border-radius: 8px; border: 1px solid #333; }
        button { background: #2962ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        #status { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="upload-container">
        <h2>Upload Key Levels (Robust Parser)</h2>
        <input type="file" id="csvFile" accept=".csv" />
        <button onclick="processUpload()">Upload Data</button>
        <div id="status"></div>
    </div>

    <script>
        const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'YOUR_SUPABASE_KEY');

        // Helper to extract numbers like "S1: 1.1385" from any string
        function getVal(text, label) {
            if (!text) return 0;
            const regex = new RegExp(`${label}:\\s*([\\d\\.]+)`);
            const match = text.match(regex);
            return match ? parseFloat(match[1]) : 0;
        }

        async function processUpload() {
            const file = document.getElementById('csvFile').files[0];
            Papa.parse(file, {
                header: false, // Set to false to parse by index
                skipEmptyLines: true,
                complete: async (results) => {
                    // Skip the first row (headers) and map by index
                    const cleanData = results.data.slice(1).map(row => {
                        return {
                            ticker: row[0],
                            s1: getVal(row[1], 'S1'),
                            s2: getVal(row[1], 'S2'),
                            r1: getVal(row[2], 'R1'),
                            r2: getVal(row[2], 'R2'),
                            bias: row[3] || 'Neutral',
                            bull_bear_line: parseFloat(row[4]) || 0,
                            trade_date: new Date().toISOString().split('T')[0]
                        };
                    });

                    const { error } = await client.from('key_levels').insert(cleanData);
                    document.getElementById('status').innerText = error ? "Error: " + error.message : "Success!";
                    if(error) console.error(error);
                }
            });
        }
    </script>
</body>
</html>
