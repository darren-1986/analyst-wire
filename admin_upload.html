    function parseFileToRows(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: null});
                    resolve(rows);
                } catch(err) { reject(err); }
            };
            reader.readAsArrayBuffer(file);
        });
    }

    // ==========================================================
    // PROCESS KEY LEVELS ENGINE 
    // ==========================================================
    async function processKeyLevels() {
        // [Existing Key Levels code remains exactly the same]
        const fileInput = document.getElementById('excelFile-kl');
        const date = document.getElementById('upload-date-kl').value;
        const statusDiv = document.getElementById('status-kl');
        const debugDiv = document.getElementById('debug-panel');

        debugDiv.style.display = 'none';

        if (!fileInput.files.length || !date) return alert("Select a file AND choose a target date.");
        statusDiv.innerText = "Processing Key Levels Data...";

        try {
            const rows = await parseFileToRows(fileInput.files[0]);
            if (rows.length < 2) return statusDiv.innerText = "Error: File is empty or invalid.";

            const rawHeaders = rows[0];
            const formattedData = [];
            const uploadTimestamp = new Date().toISOString();

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || !row[0]) continue;

                let payloadObj = {
                    trade_date: date,
                    last_updated: uploadTimestamp
                };

                rawHeaders.forEach((header, idx) => {
                    if (header === undefined || header === null) return;
                    let h = String(header).toLowerCase().replace(/[^a-z0-9]/g, '');
                    let dbKey = "";

                    if (h.includes('ticker') || h.includes('symbol')) dbKey = 'ticker';
                    else if (h.includes('prev') || h.includes('prior') || h.includes('previous')) dbKey = 'prev_bull_bear';
                    else if (h.includes('bull') || h.includes('bear')) dbKey = 'bull_bear_line';
                    else if (h.includes('bias')) dbKey = 'bias';
                    else if (h === 's1') dbKey = 's1';
                    else if (h === 'r1') dbKey = 'r1';
                    else if (h === 's2') dbKey = 's2';
                    else if (h === 'r2') dbKey = 'r2';
                    else if (h.includes('analysis')) dbKey = 'analysis';
                    else if (h.includes('lollipop') || h.includes('lollopop')) dbKey = 'lollipop';

                    if (dbKey && row[idx] !== undefined && row[idx] !== null) {
                        let val = String(row[idx]).trim();
                        if (val === '' || val === '-' || val.toLowerCase() === 'n/a') {
                            payloadObj[dbKey] = null;
                        } else {
                            const numericColumns = ['prev_bull_bear', 'bull_bear_line', 's1', 'r1', 's2', 'r2'];
                            if (numericColumns.includes(dbKey)) {
                                val = val.replace(/,/g, '.').replace(/[^\d.-]/g, '');
                                let parsedVal = parseFloat(val);
                                payloadObj[dbKey] = isNaN(parsedVal) ? null : parsedVal;
                            } else {
                                payloadObj[dbKey] = val;
                            }
                        }
                    }
                });

                if (payloadObj.ticker) {
                    formattedData.push(payloadObj);
                }
            }

            if (formattedData.length === 0) return statusDiv.innerText = "Error: No valid rows extracted.";

            statusDiv.innerText = `Pushing ${formattedData.length} rows to database...`;
            await client.from('key_levels').delete().eq('trade_date', date);
            const { error } = await client.from('key_levels').insert(formattedData);
            statusDiv.innerText = error ? "Supabase Error: " + error.message : `Success! Uploaded ${formattedData.length} Key Levels.`;

        } catch (err) {
            statusDiv.innerText = "Parsing Error: " + err.message;
        }
    }

    // ==========================================================
    // FX OPTION EXPIRIES UPLOAD ENGINE 
    // ==========================================================
    async function processExpiries() {
        // [Existing FX Expiries code remains exactly the same]
        const fileInput = document.getElementById('excelFile-exp');
        const date = document.getElementById('upload-date-exp').value;
        const statusDiv = document.getElementById('status-exp');

        if (!fileInput.files.length || !date) return alert("Select a data file AND date entry.");
        statusDiv.innerText = "Parsing FX Option Expiries...";

        try {
            const rows = await parseFileToRows(fileInput.files[0]);
            if (rows.length < 3) return statusDiv.innerText = "Error: Dataset lacks required structural row depth.";

            const headers = rows[0]; 
            const spotRow = rows[1]; 
            const tickerMap = {};
            const spotPriceMap = {};
            const corePortfolio = ['EUR/USD', 'GBP/USD', 'USD/JPY', 'AUD/USD', 'USD/CAD', 'EUR/GBP'];

            headers.forEach((header, index) => {
                const tickerStr = String(header || '').trim();
                if (corePortfolio.includes(tickerStr)) {
                    tickerMap[index] = tickerStr;
                    const rawSpot = spotRow ? spotRow[index] : null;
                    if (rawSpot !== undefined && rawSpot !== null && String(rawSpot).trim() !== '') {
                        spotPriceMap[tickerStr] = parseFloat(String(rawSpot).replace(/,/g, '.').replace(/[^\d.-]/g, ''));
                    }
                }
            });

            const flatData = [];
            const regex = /([\d\.,]+)\s*\([^\d]*([\d\.,]+)([bm]+)\)/gi;
            const uploadTimestamp = new Date().toISOString();

            for (let i = 2; i < rows.length; i++) {
                const row = rows[i];
                if (!row) continue;

                Object.keys(tickerMap).forEach(colIdx => {
                    const ticker = tickerMap[colIdx];
                    const cellString = row[colIdx];
                    if (!cellString) return;

                    let match;
                    regex.lastIndex = 0;

                    while ((match = regex.exec(String(cellString))) !== null) {
                        const strike = parseFloat(match[1].replace(/,/g, '.'));
                        let vol = parseFloat(match[2].replace(/,/g, '.'));
                        const denomination = match[3].toLowerCase();

                        if (denomination.includes('m')) vol = vol / 1000;

                        flatData.push({
                            trade_date: date,
                            ticker: ticker,
                            strike: strike,
                            volume: parseFloat(vol.toFixed(3)),
                            spot_price: spotPriceMap[ticker] || null,
                            last_updated: uploadTimestamp
                        });
                    }
                });
            }

            if (flatData.length === 0) return statusDiv.innerText = "Error: Zero options columns successfully targeted.";

            statusDiv.innerText = `Pushing ${flatData.length} FX Option entries to Supabase...`;
            await client.from('order_levels').delete().eq('trade_date', date);
            const { error } = await client.from('order_levels').insert(flatData);
            statusDiv.innerText = error ? "Supabase Error: " + error.message : `Success! Uploaded ${flatData.length} FX Option Expiries seamlessly.`;

        } catch (err) {
            statusDiv.innerText = "Execution Failure: " + err.message;
        }
    }

    // ==========================================================
    // MULTILINE TRADE IDEAS PARSER & UPLOAD ENGINE
    // ==========================================================
    async function processTradeIdeas() {
        const textInput = document.getElementById('trade-ideas-text').value.trim();
        const statusDiv = document.getElementById('status-ti');

        if (!textInput) return alert("Please paste trade ideas text.");
        statusDiv.innerText = "Parsing Trade Ideas...";

        try {
            let globalDate = new Date().toISOString().split('T')[0];
            const dateLineMatch = textInput.match(/^([A-Za-z]+ \d{1,2}(?:st|nd|rd|th)? \d{4})/i);
            if (dateLineMatch) {
                globalDate = dateLineMatch[1];
            }

            const tradeBlocks = textInput.split(/Trade Idea \d+:/i);
            const parsedData = [];
            const uploadTimestamp = new Date().toISOString();

            tradeBlocks.forEach((block, index) => {
                if (!block.trim()) return;
                
                if (index === 0 && !block.toLowerCase().includes('instrument:')) return;

                // BULLETPROOFING: Force a newline before any keyword to prevent merged lines from copy-pasting
                let normalizedBlock = block
                    .replace(/(Instrument:)/gi, '\n$1')
                    .replace(/(Direction:)/gi, '\n$1')
                    .replace(/(Strike:)/gi, '\n$1')
                    .replace(/(Entry:)/gi, '\n$1')
                    .replace(/(Key Levels:)/gi, '\n$1')
                    .replace(/(Rationale:)/gi, '\n$1')
                    .replace(/(Conditions:)/gi, '\n$1');

                const lines = normalizedBlock.split('\n');
                let currentKey = 'title';
                let trade = {
                    trade_date: globalDate,
                    title: '',
                    instrument: '',
                    direction: '',
                    strike: null,
                    entry: null,
                    key_levels: null, 
                    rationale: '',
                    conditions: '',
                    last_updated: uploadTimestamp
                };

                lines.forEach(line => {
                    line = line.trim();
                    if (!line) return;

                    let lowerLine = line.toLowerCase();
                    if (lowerLine.startsWith('instrument:')) { currentKey = 'instrument'; trade.instrument = line.substring(11).trim(); }
                    else if (lowerLine.startsWith('direction:')) { currentKey = 'direction'; trade.direction = line.substring(10).trim(); }
                    else if (lowerLine.startsWith('strike:')) { currentKey = 'strike'; trade.strike = line.substring(7).trim(); }
                    else if (lowerLine.startsWith('entry:')) { currentKey = 'entry'; trade.entry = line.substring(6).trim(); }
                    else if (lowerLine.startsWith('key levels:')) { currentKey = 'key_levels'; trade.key_levels = line.substring(11).trim(); }
                    else if (lowerLine.startsWith('rationale:')) { currentKey = 'rationale'; trade.rationale = line.substring(10).trim(); }
                    else if (lowerLine.startsWith('conditions:')) { currentKey = 'conditions'; trade.conditions = line.substring(11).trim(); }
                    else {
                        if (currentKey && trade[currentKey] !== undefined) {
                            if (currentKey === 'title') {
                                trade.title += (trade.title ? ' ' : '') + line;
                            } else {
                                trade[currentKey] += ' ' + line;
                            }
                        }
                    }
                });

                if (trade.instrument) {
                    parsedData.push(trade);
                }
            });

            if (parsedData.length === 0) {
                return statusDiv.innerText = "Error: No valid trade ideas could be parsed from the text provided.";
            }

            statusDiv.innerText = `Pushing ${parsedData.length} Trade Ideas to Supabase...`;
            
            // 1. Insert new trades
            const { error } = await client.from('trade_ideas').insert(parsedData);

            if (error) {
                statusDiv.innerText = "Supabase Error: " + error.message;
                return;
            } 
            
            // 2. 2-Day Retention Cleanup Logic
            const { data: datesData } = await client.from('trade_ideas').select('trade_date');
            if (datesData) {
                // Extract unique dates and sort them from newest to oldest
                const uniqueDates = [...new Set(datesData.map(d => d.trade_date))].sort((a, b) => new Date(b) - new Date(a));
                
                // If there are more than 2 unique days, delete the older ones
                if (uniqueDates.length > 2) {
                    const datesToDelete = uniqueDates.slice(2);
                    for (const oldDate of datesToDelete) {
                        await client.from('trade_ideas').delete().eq('trade_date', oldDate);
                    }
                }
            }

            statusDiv.innerText = `Success! Uploaded ${parsedData.length} Trade Idea(s) and cleaned up older data.`;
            document.getElementById('trade-ideas-text').value = ''; 

        } catch (err) {
            statusDiv.innerText = "Execution Failure: " + err.message;
        }
    }
</script>
