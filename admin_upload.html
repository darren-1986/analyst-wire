<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>Analyst Wire | Admin Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { background: #0f1115; color: white; font-family: sans-serif; margin: 0; }
        .top-nav { background: #1c2230; padding: 15px 20px; display: flex; gap: 20px; border-bottom: 2px solid #2a2e39; align-items: center; }
        .top-nav button, .top-nav a { background: none; border: none; color: #787b86; cursor: pointer; font-size: 1rem; text-decoration: none; font-weight: bold; }
        .top-nav button:hover, .top-nav a:hover { color: #fff; }
        .top-nav .active { color: #2962ff; }
        .upload-container { max-width: 600px; margin: 40px auto; background: #1a1d23; padding: 25px; border-radius: 8px; border: 1px solid #333; }
        .tabs-header { display: flex; border-bottom: 1px solid #333; margin-bottom: 20px; overflow-x: auto; }
        .tab-button { background: none; border: none; color: #787b86; padding: 10px 15px; cursor: pointer; font-size: 15px; border-bottom: 2px solid transparent; transition: all 0.3s; white-space: nowrap; }
        .tab-button:hover { color: #fff; }
        .tab-button.active { color: #2962ff; border-bottom: 2px solid #2962ff; font-weight: bold; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        input[type="file"], input[type="date"] { margin: 15px 0; display: block; width: 100%; padding: 8px; background: #1a1d23; color: white; border: 1px solid #333; box-sizing: border-box; }
        button.action-btn { background: #2962ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button.action-btn:hover { background: #1e4bd8; }
        .status-msg { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="admin.html">Users</a>
    <a href="admin.html">Revenue</a>
    <a href="terminal.html">Terminal</a>
    <a href="admin_upload.html" class="active">Upload Data</a>
    <button id="logoutBtn">Logout</button>
</div>

<div class="upload-container">
    <div class="tabs-header">
        <button class="tab-button active" onclick="switchTab(event, 'tab-key-levels')">Key Levels</button>
        <button class="tab-button" onclick="switchTab(event, 'tab-expiries')">Order Expiries</button>
        <button class="tab-button" onclick="switchTab(event, 'tab-project-3')">Section 3</button>
    </div>

    <div id="tab-key-levels" class="tab-pane active">
        <h2>Upload Key Levels</h2>
        <label>Select Date:</label>
        <input type="date" id="upload-date-kl">
        <input type="file" id="excelFile-kl" accept=".csv, .xlsx, .xls" />
        <button class="action-btn" onclick="processKeyLevels()">Upload Key Levels</button>
        <div id="status-kl" class="status-msg"></div>
    </div>

    <div id="tab-expiries" class="tab-pane">
        <h2>Upload Order Expiries</h2>
        <label>Select Trade Date:</label>
        <input type="date" id="upload-date-exp">
        <input type="file" id="excelFile-exp" accept=".csv, .xlsx, .xls" />
        <button class="action-btn" onclick="processExpiries()">Extract & Upload Expiries</button>
        <div id="status-exp" class="status-msg"></div>
    </div>

    <div id="tab-project-3" class="tab-pane">
        <h2>Section 3</h2>
        <p style="color: #787b86;">Future upload tools will go here.</p>
    </div>
</div>

<script>
    function switchTab(evt, tabId) {
        document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

    document.getElementById('logoutBtn').addEventListener('click', async () => { 
        await client.auth.signOut(); 
        window.location.href = 'index.html'; 
    });

    // Uses SheetJS to safely read both CSV and Excel so commas inside text aren't broken
    function parseFileToRowsSafe(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: null});
                    resolve(rows);
                } catch(err) { reject(err); }
            };
            reader.readAsArrayBuffer(file);
        });
    }

    // ==========================================
    // MODULE 1: KEY LEVELS UPLOAD
    // ==========================================
    async function processKeyLevels() {
        const fileInput = document.getElementById('excelFile-kl');
        const date = document.getElementById('upload-date-kl').value;
        const statusDiv = document.getElementById('status-kl');
        
        if (!fileInput.files.length || !date) return alert("Select a file AND choose a target date.");
        statusDiv.innerText = "Processing Key Levels Data...";

        try {
            const rows = await parseFileToRowsSafe(fileInput.files[0]);
            if (rows.length < 2) return statusDiv.innerText = "Error: File is empty or invalid.";

            const rawHeaders = rows[0];
            const formattedData = [];
            const uploadTimestamp = new Date().toISOString();

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || !row[0]) continue; 

                let payloadObj = { 
                    trade_date: date,
                    last_updated: uploadTimestamp
                };
                
                rawHeaders.forEach((header, idx) => {
                    if (!header) return;
                    let headerStr = String(header).toLowerCase().trim();
                    let dbKey = "";

                    // STRICT MAPPING: Force your exact CSV headers to match the Supabase table names
                    if (headerStr.includes('ticker')) dbKey = 'ticker';
                    else if (headerStr.includes('s.t. bias') || headerStr === 'bias') dbKey = 'bias';
                    else if (headerStr.includes('bull/bear')) dbKey = 'bull/bear';
                    else if (headerStr === 's1') dbKey = 's1';
                    else if (headerStr === 'r1') dbKey = 'r1';
                    else if (headerStr === 's2') dbKey = 's2';
                    else if (headerStr === 'r2') dbKey = 'r2';
                    else if (headerStr.includes('analysis')) dbKey = 'analysis';
                    else if (headerStr.includes('lollopop') || headerStr.includes('lollipop')) dbKey = 'lollipop';
                    
                    if (dbKey && row[idx] !== undefined && row[idx] !== null && String(row[idx]).trim() !== '') {
                        payloadObj[dbKey] = String(row[idx]).trim();
                    }
                });
                
                // Only push valid ticker rows
                if (payloadObj.ticker) {
                    formattedData.push(payloadObj);
                }
            }

            if (formattedData.length === 0) {
                statusDiv.innerText = "Error: Could not extract any valid rows. Check your headers.";
                return;
            }

            statusDiv.innerText = `Pushing ${formattedData.length} extracted rows to Supabase...`;
            console.log("EXACT DATA GOING TO SUPABASE:", formattedData); // You can check this in F12 console
            
            await client.from('key_levels').delete().eq('trade_date', date);
            const { error } = await client.from('key_levels').insert(formattedData);
            
            statusDiv.innerText = error ? "Supabase Error: " + error.message : `Success! Uploaded ${formattedData.length} Key Levels perfectly.`;

        } catch (err) {
            statusDiv.innerText = "Parsing Error: " + err.message;
        }
    }

    // ==========================================
    // MODULE 2: ORDER EXPIRIES UPLOAD
    // ==========================================
    async function processExpiries() {
        const fileInput = document.getElementById('excelFile-exp');
        const date = document.getElementById('upload-date-exp').value;
        const statusDiv = document.getElementById('status-exp');
        
        if (!fileInput.files.length || !date) return alert("Select a data file AND date entry.");
        statusDiv.innerText = "Parsing Order Expiries...";

        try {
            const rows = await parseFileToRowsSafe(fileInput.files[0]);
            
            const headers = rows[0]; 
            const spotRow = rows[1]; 
            
            const tickerMap = {}; 
            const spotPriceMap = {}; 
            const corePortfolio = ['EUR/USD', 'GBP/USD', 'USD/JPY', 'AUD/USD', 'USD/CAD', 'EUR/GBP'];

            headers.forEach((header, index) => {
                const tickerStr = String(header || '').trim();
                if (corePortfolio.includes(tickerStr)) {
                    tickerMap[index] = tickerStr;
                    
                    const rawSpot = spotRow ? spotRow[index] : null;
                    if (rawSpot !== undefined && rawSpot !== null && String(rawSpot).trim() !== '') {
                        spotPriceMap[tickerStr] = parseFloat(String(rawSpot).replace(/[^\d.-]/g, ''));
                    }
                }
            });

            const flatData = [];
            const regex = /([\d\.]+)\s*\([^\d]*([\d\.]+)([bm]+)\)/gi;
            const uploadTimestamp = new Date().toISOString();

            for (let i = 3; i < rows.length; i++) {
                const row = rows[i];
                if (!row) continue;

                Object.keys(tickerMap).forEach(colIdx => {
                    const ticker = tickerMap[colIdx];
                    const cellString = row[colIdx];
                    if (!cellString) return;

                    let match;
                    regex.lastIndex = 0;
                    
                    while ((match = regex.exec(String(cellString))) !== null) {
                        const strike = parseFloat(match[1]);
                        let vol = parseFloat(match[2]);
                        const denomination = match[3].toLowerCase();

                        if (denomination.includes('m')) vol = vol / 1000;

                        flatData.push({
                            trade_date: date,
                            ticker: ticker,
                            strike: strike,
                            volume: parseFloat(vol.toFixed(3)),
                            spot_price: spotPriceMap[ticker],
                            last_updated: uploadTimestamp
                        });
                    }
                });
            }

            statusDiv.innerText = `Pushing ${flatData.length} order levels to Supabase...`;
            await client.from('order_levels').delete().eq('trade_date', date);
            const { error } = await client.from('order_levels').insert(flatData);
            
            statusDiv.innerText = error ? "Supabase Error: " + error.message : `Success! Uploaded ${flatData.length} order levels.`;

        } catch (err) {
            statusDiv.innerText = "Execution Failure: " + err.message;
        }
    }
</script>
</body>
</html>
