<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyst Wire | Admin Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background: #0f1115; color: white; font-family: sans-serif; margin: 0; }

        /* Admin Navigation Styles */
        .top-nav { background: #1c2230; padding: 15px 20px; display: flex; gap: 20px; border-bottom: 2px solid #2a2e39; align-items: center; }
        .top-nav button, .top-nav a { background: none; border: none; color: #787b86; cursor: pointer; font-size: 1rem; text-decoration: none; font-weight: bold; }
        .top-nav button:hover, .top-nav a:hover { color: #fff; }
        .top-nav .active { color: #2962ff; }

        /* Upload Styles */
        .upload-container { max-width: 500px; margin: 40px auto; background: #1a1d23; padding: 25px; border-radius: 8px; border: 1px solid #333; }
        input[type="file"], input[type="date"] { margin: 15px 0; display: block; width: 100%; padding: 8px; background: #1a1d23; color: white; border: 1px solid #333; }
        button#upload-btn { background: #2962ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        #status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="admin.html">Users</a>
    <a href="admin.html">Revenue</a>
    <a href="terminal.html">Terminal</a>
    <a href="admin_upload.html" class="active">Upload Data</a>
    <button id="logoutBtn">Logout</button>
</div>

<div class="upload-container">
    <h2>Upload Key Levels</h2>
    <label>Select Date:</label>
    <input type="date" id="upload-date">
    <input type="file" id="csvFile" accept=".csv" />
    <button id="upload-btn" onclick="processUpload()">Upload & Replace Data</button>
    <div id="status"></div>
</div>

<script>
    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

    document.getElementById('logoutBtn').addEventListener('click', async () => { 
        await client.auth.signOut(); 
        window.location.href = 'index.html'; 
    });

    function findVal(rowArray, label) {
        if (!Array.isArray(rowArray)) return 0;
        const fullText = rowArray.join(" ");
        const regex = new RegExp(`${label}:\\s*([\\d\\.]+)`);
        const match = fullText.match(regex);
        return match ? parseFloat(match[1]) : 0;
    }

    async function processUpload() {
        const file = document.getElementById('csvFile').files[0];
        const date = document.getElementById('upload-date').value;
        if (!file || !date) return alert("Select file AND date.");

        Papa.parse(file, {
            header: false,
            skipEmptyLines: true,
            complete: async (results) => {
                await client.from('key_levels').delete().eq('trade_date', date);

                const cleanData = results.data.slice(1).filter(r => Array.isArray(r)).map(row => {
                    const s1 = findVal(row, 'S1');
                    const r1 = findVal(row, 'R1');
                    const bbl = parseFloat(row[4]) || 0;
                    const mid = (s1 + r1) / 2;
                    
                    const calculatedBias = (bbl > mid) ? '↑ Bullish' : (bbl < mid ? '↓ Bearish' : 'Neutral');

                    return {
                        ticker: row[0],
                        s1: s1,
                        s2: findVal(row, 'S2'),
                        r1: r1,
                        r2: findVal(row, 'R2'),
                        bias: calculatedBias,
                        bull_bear_line: bbl,
                        trade_date: date
                    };
                });

                const { error } = await client.from('key_levels').insert(cleanData);
                document.getElementById('status').innerText = error ? "Error: " + error.message : "Success! Bias auto-calculated.";
            }
        });
    }
</script>
</body>
</html>
