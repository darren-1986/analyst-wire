<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>body{background:#0f1115; color:white; padding:40px; font-family:sans-serif;}</style>
</head>
<body>
    <div style="max-width:500px; background:#1a1d23; padding:25px; border-radius:8px;">
        <h2>Upload Data</h2>
        <input type="file" id="csvFile" accept=".csv" />
        <button onclick="processUpload()">Upload & Process</button>
        <div id="status"></div>
    </div>

    <script>
        const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

        async function processUpload() {
            const file = document.getElementById('csvFile').files[0];
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async (results) => {
                    const cleanData = results.data.map(row => {
                        // Extracting values specifically from your headers
                        const bbLine = parseFloat(row['BULL/BEAR LINE']) || 0;
                        const s1 = parseFloat(row['SUPPORT']?.split('S1:')[1]) || 0;
                        const r1 = parseFloat(row['RESISTANCE']?.split('R1:')[1]) || 0;
                        
                        // AUTO-BIAS ENGINE: If CSV is empty, calculate based on where BB Line sits relative to range
                        let bias = row['S.T. Bias'];
                        if (!bias || bias.trim() === "") {
                            bias = (bbLine > (s1 + (r1-s1)/2)) ? "↑ Bullish" : "↓ Bearish";
                        }

                        return {
                            ticker: row['Ticker'],
                            bias: bias,
                            bull_bear_line: bbLine,
                            s1: s1,
                            s2: parseFloat(row['SUPPORT']?.split('S2:')[1]) || 0,
                            r1: r1,
                            r2: parseFloat(row['RESISTANCE']?.split('R2:')[1]) || 0,
                            trade_date: new Date().toISOString().split('T')[0]
                        };
                    });

                    const { error } = await client.from('key_levels').insert(cleanData);
                    document.getElementById('status').innerText = error ? "Error: " + error.message : "Success! Data Uploaded.";
                }
            });
        }
    </script>
</body>
</html>
