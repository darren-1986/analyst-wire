<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>Analyst Wire | Admin Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { background: #0f1115; color: white; font-family: sans-serif; margin: 0; }
        .top-nav { background: #1c2230; padding: 15px 20px; display: flex; gap: 20px; border-bottom: 2px solid #2a2e39; align-items: center; }
        .top-nav button, .top-nav a { background: none; border: none; color: #787b86; cursor: pointer; font-size: 1rem; text-decoration: none; font-weight: bold; }
        .top-nav button:hover, .top-nav a:hover { color: #fff; }
        .top-nav .active { color: #2962ff; }
        .upload-container { max-width: 600px; margin: 40px auto; background: #1a1d23; padding: 25px; border-radius: 8px; border: 1px solid #333; }
        .tabs-header { display: flex; border-bottom: 1px solid #333; margin-bottom: 20px; overflow-x: auto; }
        .tab-button { background: none; border: none; color: #787b86; padding: 10px 15px; cursor: pointer; font-size: 15px; border-bottom: 2px solid transparent; transition: all 0.3s; white-space: nowrap; }
        .tab-button:hover { color: #fff; }
        .tab-button.active { color: #2962ff; border-bottom: 2px solid #2962ff; font-weight: bold; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        /* Added textarea styling to perfectly match inputs and maintain strict padding/height consistency */
        input[type="file"], input[type="date"], textarea { margin: 15px 0; display: block; width: 100%; padding: 8px; background: #1a1d23; color: white; border: 1px solid #333; box-sizing: border-box; font-family: sans-serif; }
        textarea { resize: vertical; line-height: 1.4; }
        button.action-btn { background: #2962ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button.action-btn:hover { background: #1e4bd8; }
        .status-msg { margin-top: 20px; font-size: 14px; }
        #debug-panel { background: #2a2e39; padding: 15px; margin-top: 20px; border-radius: 4px; font-family: monospace; font-size: 11px; white-space: pre-wrap; display: none; color: #4CAF50; overflow-x: auto; }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="admin.html">Users</a>
    <a href="admin.html">Revenue</a>
    <a href="terminal.html">Terminal</a>
    <a href="admin_upload.html" class="active">Upload Data</a>
    <button id="logoutBtn">Logout</button>
</div>

<div class="upload-container">
    <div class="tabs-header">
        <button class="tab-button active" onclick="switchTab(event, 'tab-key-levels')">Key Levels</button>
        <button class="tab-button" onclick="switchTab(event, 'tab-expiries')">FX Option Expiries</button>
        <button class="tab-button" onclick="switchTab(event, 'tab-project-3')">Trade Ideas</button>
    </div>

    <div id="tab-key-levels" class="tab-pane active">
        <h2>Upload Key Levels</h2>
        <label>Select Date:</label>
        <input type="date" id="upload-date-kl">
        <input type="file" id="excelFile-kl" accept=".csv, text/csv, application/vnd.ms-excel, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, */*" />
        <button class="action-btn" onclick="processKeyLevels()">Upload Key Levels</button>
        <div id="status-kl" class="status-msg"></div>
        <div id="debug-panel"></div>
    </div>

    <div id="tab-expiries" class="tab-pane">
        <h2>Upload FX Option Expiries</h2>
        <label>Select Trade Date:</label>
        <input type="date" id="upload-date-exp">
        <input type="file" id="excelFile-exp" accept=".csv, text/csv, application/vnd.ms-excel, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, */*" />
        <button class="action-btn" onclick="processExpiries()">Extract & Upload Expiries</button>
        <div id="status-exp" class="status-msg"></div>
    </div>

    <div id="tab-project-3" class="tab-pane">
        <h2>Upload Trade Ideas</h2>
        <p style="color: #787b86; margin-bottom: 5px; font-size: 14px;">Paste raw text containing one or multiple trade ideas below.</p>
        <textarea id="trade-ideas-text" rows="12" placeholder="July 21st 2026:&#10;Trade Idea 1: EUR/GBP Call Option&#10;Instrument: EUR/GBP&#10;Direction: Long&#10;Strike: 0.8510 call&#10;..."></textarea>
        <button class="action-btn" onclick="processTradeIdeas()">Upload Trade Ideas</button>
        <div id="status-ti" class="status-msg"></div>
    </div>
</div>

<script>
    function switchTab(evt, tabId) {
        document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

    document.getElementById('logoutBtn').addEventListener('click', async () => { 
        await client.auth.signOut(); 
        window.location.href = 'index.html'; 
    });

    function parseFileToRows(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: null});
                    resolve(rows);
                } catch(err) { reject(err); }
            };
            reader.readAsArrayBuffer(file);
        });
    }

    // ==========================================================
    // PROCESS KEY LEVELS ENGINE 
    // ==========================================================
    async function processKeyLevels() {
        const fileInput = document.getElementById('excelFile-kl');
        const date = document.getElementById('upload-date-kl').value;
        const statusDiv = document.getElementById('status-kl');
        const debugDiv = document.getElementById('debug-panel');

        debugDiv.style.display = 'none';

        if (!fileInput.files.length || !date) return alert("Select a file AND choose a target date.");
        statusDiv.innerText = "Processing Key Levels Data...";

        try {
            const rows = await parseFileToRows(fileInput.files[0]);
            if (rows.length < 2) return statusDiv.innerText = "Error: File is empty or invalid.";

            const rawHeaders = rows[0];
            const formattedData = [];
            const uploadTimestamp = new Date().toISOString();

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || !row[0]) continue;

                let payloadObj = {
                    trade_date: date,
                    last_updated: uploadTimestamp
                };

                rawHeaders.forEach((header, idx) => {
                    if (header === undefined || header === null) return;

                    let h = String(header).toLowerCase().replace(/[^a-z0-9]/g, '');
                    let dbKey = "";

                    if (h.includes('ticker') || h.includes('symbol')) dbKey = 'ticker';
                    else if (h.includes('prev') || h.includes('prior') || h.includes('previous')) dbKey = 'prev_bull_bear';
                    else if (h.includes('bull') || h.includes('bear')) dbKey = 'bull_bear_line';
                    else if (h.includes('bias')) dbKey = 'bias';
                    else if (h === 's1') dbKey = 's1';
                    else if (h === 'r1') dbKey = 'r1';
                    else if (h === 's2') dbKey = 's2';
                    else if (h === 'r2') dbKey = 'r2';
                    else if (h.includes('analysis')) dbKey = 'analysis';
                    else if (h.includes('lollipop') || h.includes('lollopop')) dbKey = 'lollipop';

                    if (dbKey && row[idx] !== undefined && row[idx] !== null) {
                        let val = String(row[idx]).trim();

                        if (val === '' || val === '-' || val.toLowerCase() === 'n/a') {
                            payloadObj[dbKey] = null;
                        } else {
                            const numericColumns = ['prev_bull_bear', 'bull_bear_line', 's1', 'r1', 's2', 'r2'];

                            if (numericColumns.includes(dbKey)) {
                                val = val.replace(/,/g, '.').replace(/[^\d.-]/g, '');
                                let parsedVal = parseFloat(val);
                                payloadObj[dbKey] = isNaN(parsedVal) ? null : parsedVal;
                            } else {
                                payloadObj[dbKey] = val;
                            }
                        }
                    }
                });

                if (payloadObj.ticker) {
                    formattedData.push(payloadObj);
                }
            }

            if (formattedData.length === 0) return statusDiv.innerText = "Error: No valid rows extracted.";

            debugDiv.style.display = 'block';
            debugDiv.innerText = "--- DIAGNOSTICS ---\n" +
                                 "RAW HEADERS DETECTED: " + JSON.stringify(rawHeaders) + "\n\n" +
                                 "--- DATA PREPARED FOR SUPABASE ---\n" +
                                 "Rows ready to upload: " + formattedData.length + "\n\n" +
                                 "Sample of first row (Verifying all key levels are populated):\n" +
                                 JSON.stringify(formattedData[0], null, 2);

            statusDiv.innerText = `Pushing ${formattedData.length} rows to database...`;

            await client.from('key_levels').delete().eq('trade_date', date);
            const { error } = await client.from('key_levels').insert(formattedData);

            if (error) {
                statusDiv.innerText = "Supabase Error: " + error.message;
            } else {
                statusDiv.innerText = `Success! Uploaded ${formattedData.length} Key Levels.`;
            }

        } catch (err) {
            statusDiv.innerText = "Parsing Error: " + err.message;
        }
    }

    // ==========================================================
    // FX OPTION EXPIRIES UPLOAD ENGINE (FIXED LAYOUT & ROW SYNC)
    // ==========================================================
    async function processExpiries() {
        const fileInput = document.getElementById('excelFile-exp');
        const date = document.getElementById('upload-date-exp').value;
        const statusDiv = document.getElementById('status-exp');

        if (!fileInput.files.length || !date) return alert("Select a data file AND date entry.");
        statusDiv.innerText = "Parsing FX Option Expiries...";

        try {
            const rows = await parseFileToRows(fileInput.files[0]);
            if (rows.length < 3) return statusDiv.innerText = "Error: Dataset lacks required structural row depth.";

            const headers = rows[0]; 
            const spotRow = rows[1]; 

            const tickerMap = {};
            const spotPriceMap = {};
            const corePortfolio = ['EUR/USD', 'GBP/USD', 'USD/JPY', 'AUD/USD', 'USD/CAD', 'EUR/GBP'];

            headers.forEach((header, index) => {
                const tickerStr = String(header || '').trim();
                if (corePortfolio.includes(tickerStr)) {
                    tickerMap[index] = tickerStr;
                    const rawSpot = spotRow ? spotRow[index] : null;
                    if (rawSpot !== undefined && rawSpot !== null && String(rawSpot).trim() !== '') {
                        spotPriceMap[tickerStr] = parseFloat(String(rawSpot).replace(/,/g, '.').replace(/[^\d.-]/g, ''));
                    }
                }
            });

            const flatData = [];
            const regex = /([\d\.,]+)\s*\([^\d]*([\d\.,]+)([bm]+)\)/gi;
            const uploadTimestamp = new Date().toISOString();

            for (let i = 2; i < rows.length; i++) {
                const row = rows[i];
                if (!row) continue;

                Object.keys(tickerMap).forEach(colIdx => {
                    const ticker = tickerMap[colIdx];
                    const cellString = row[colIdx];
                    if (!cellString) return;

                    let match;
                    regex.lastIndex = 0;

                    while ((match = regex.exec(String(cellString))) !== null) {
                        const strike = parseFloat(match[1].replace(/,/g, '.'));
                        let vol = parseFloat(match[2].replace(/,/g, '.'));
                        const denomination = match[3].toLowerCase();

                        if (denomination.includes('m')) vol = vol / 1000;

                        flatData.push({
                            trade_date: date,
                            ticker: ticker,
                            strike: strike,
                            volume: parseFloat(vol.toFixed(3)),
                            spot_price: spotPriceMap[ticker] || null,
                            last_updated: uploadTimestamp
                        });
                    }
                });
            }

            if (flatData.length === 0) return statusDiv.innerText = "Error: Zero options columns successfully targeted.";

            statusDiv.innerText = `Pushing ${flatData.length} FX Option entries to Supabase...`;
            await client.from('order_levels').delete().eq('trade_date', date);
            const { error } = await client.from('order_levels').insert(flatData);

            statusDiv.innerText = error ? "Supabase Error: " + error.message : `Success! Uploaded ${flatData.length} FX Option Expiries seamlessly.`;

        } catch (err) {
            statusDiv.innerText = "Execution Failure: " + err.message;
        }
    }

    // ==========================================================
    // MULTILINE TRADE IDEAS PARSER & UPLOAD ENGINE
    // ==========================================================
    async function processTradeIdeas() {
        const textInput = document.getElementById('trade-ideas-text').value.trim();
        const statusDiv = document.getElementById('status-ti');

        if (!textInput) return alert("Please paste trade ideas text.");
        statusDiv.innerText = "Parsing Trade Ideas...";

        try {
            // Extracts a global date string if provided at the absolute top (e.g., "July 21st 2026:")
            let globalDate = new Date().toISOString().split('T')[0];
            const dateLineMatch = textInput.match(/^([A-Za-z]+ \d{1,2}(?:st|nd|rd|th)? \d{4})/i);
            if (dateLineMatch) {
                globalDate = dateLineMatch[1];
            }

            // Split the raw text dynamically by "Trade Idea X:" blocks
            const tradeBlocks = textInput.split(/Trade Idea \d+:/i);
            const parsedData = [];
            const uploadTimestamp = new Date().toISOString();

            tradeBlocks.forEach((block, index) => {
                if (!block.trim()) return;
                
                // Skip the initial date string block if it doesn't contain trade setup fields
                if (index === 0 && !block.toLowerCase().includes('instrument:')) return;

                const lines = block.trim().split('\n');
                let currentKey = 'title';
                let trade = {
                    trade_date: globalDate,
                    title: '',
                    instrument: '',
                    direction: '',
                    strike: '',
                    entry: '',
                    rationale: '',
                    conditions: '',
                    last_updated: uploadTimestamp
                };

                // State-machine parsing line-by-line allows for multi-line paragraphs in Rationale and Conditions
                lines.forEach(line => {
                    line = line.trim();
                    if (!line) return;

                    let lowerLine = line.toLowerCase();
                    if (lowerLine.startsWith('instrument:')) { currentKey = 'instrument'; trade.instrument = line.substring(11).trim(); }
                    else if (lowerLine.startsWith('direction:')) { currentKey = 'direction'; trade.direction = line.substring(10).trim(); }
                    else if (lowerLine.startsWith('strike:')) { currentKey = 'strike'; trade.strike = line.substring(7).trim(); }
                    else if (lowerLine.startsWith('entry:')) { currentKey = 'entry'; trade.entry = line.substring(6).trim(); }
                    else if (lowerLine.startsWith('rationale:')) { currentKey = 'rationale'; trade.rationale = line.substring(10).trim(); }
                    else if (lowerLine.startsWith('conditions:')) { currentKey = 'conditions'; trade.conditions = line.substring(11).trim(); }
                    else {
                        // Append trailing multi-line text to whatever key was triggered last
                        if (currentKey && trade[currentKey] !== undefined) {
                            if (currentKey === 'title') {
                                trade.title += (trade.title ? ' ' : '') + line;
                            } else {
                                trade[currentKey] += ' ' + line;
                            }
                        }
                    }
                });

                if (trade.instrument) {
                    parsedData.push(trade);
                }
            });

            if (parsedData.length === 0) {
                return statusDiv.innerText = "Error: No valid trade ideas could be parsed from the text provided.";
            }

            statusDiv.innerText = `Pushing ${parsedData.length} Trade Ideas to Supabase...`;
            
            // Connects dynamically to a table assumed to be named 'trade_ideas'
            const { error } = await client.from('trade_ideas').insert(parsedData);

            if (error) {
                statusDiv.innerText = "Supabase Error: " + error.message;
            } else {
                statusDiv.innerText = `Success! Uploaded ${parsedData.length} Trade Idea(s).`;
                document.getElementById('trade-ideas-text').value = ''; 
            }

        } catch (err) {
            statusDiv.innerText = "Execution Failure: " + err.message;
        }
    }
</script>
</body>
</html>
