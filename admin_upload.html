<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>Analyst Wire | Admin Upload</title>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { background: #0f1115; color: white; font-family: sans-serif; margin: 0; }
        
        .top-nav { background: #1c2230; padding: 15px 20px; display: flex; gap: 20px; border-bottom: 2px solid #2a2e39; align-items: center; }
        .top-nav button, .top-nav a { background: none; border: none; color: #787b86; cursor: pointer; font-size: 1rem; text-decoration: none; font-weight: bold; }
        .top-nav button:hover, .top-nav a:hover { color: #fff; }
        .top-nav .active { color: #2962ff; }
        
        .upload-container { max-width: 600px; margin: 40px auto; background: #1a1d23; padding: 25px; border-radius: 8px; border: 1px solid #333; }
        
        .tabs-header { display: flex; border-bottom: 1px solid #333; margin-bottom: 20px; overflow-x: auto; }
        .tab-button { background: none; border: none; color: #787b86; padding: 10px 15px; cursor: pointer; font-size: 15px; border-bottom: 2px solid transparent; transition: all 0.3s; white-space: nowrap; }
        .tab-button:hover { color: #fff; }
        .tab-button.active { color: #2962ff; border-bottom: 2px solid #2962ff; font-weight: bold; }
        
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        input[type="file"], input[type="date"] { margin: 15px 0; display: block; width: 100%; padding: 8px; background: #1a1d23; color: white; border: 1px solid #333; box-sizing: border-box; }
        button.action-btn { background: #2962ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button.action-btn:hover { background: #1e4bd8; }
        .status-msg { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="admin.html">Users</a>
    <a href="admin.html">Revenue</a>
    <a href="terminal.html">Terminal</a>
    <a href="admin_upload.html" class="active">Upload Data</a>
    <button id="logoutBtn">Logout</button>
</div>

<div class="upload-container">
    <div class="tabs-header">
        <button class="tab-button active" onclick="switchTab(event, 'tab-key-levels')">Key Levels</button>
        <button class="tab-button" onclick="switchTab(event, 'tab-expiries')">Order Expiries</button>
        <button class="tab-button" onclick="switchTab(event, 'tab-project-3')">Section 3</button>
    </div>

    <div id="tab-key-levels" class="tab-pane active">
        <h2>Upload Key Levels</h2>
        <label>Select Date:</label>
        <input type="date" id="upload-date-kl">
        <input type="file" id="excelFile-kl" accept=".csv, .xlsx, .xls" />
        <button class="action-btn" onclick="processKeyLevels()">Upload Key Levels</button>
        <div id="status-kl" class="status-msg"></div>
    </div>

    <div id="tab-expiries" class="tab-pane">
        <h2>Upload Order Expiries</h2>
        <label>Select Trade Date:</label>
        <input type="date" id="upload-date-exp">
        <input type="file" id="excelFile-exp" accept=".csv, .xlsx, .xls" />
        <button class="action-btn" onclick="processExpiries()">Extract & Upload Expiries</button>
        <div id="status-exp" class="status-msg"></div>
    </div>

    <div id="tab-project-3" class="tab-pane">
        <h2>Section 3</h2>
        <p style="color: #787b86;">Future upload tools will go here.</p>
    </div>
</div>

<script>
    function switchTab(evt, tabId) {
        document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

    document.getElementById('logoutBtn').addEventListener('click', async () => { 
        await client.auth.signOut(); 
        window.location.href = 'index.html'; 
    });

    // --- KEY LEVELS LOGIC (Updated to use SheetJS) ---
    async function processKeyLevels() {
        // Leaving this open for your standard Key Levels spreadsheet mapping,
        // it functions the exact same way as the Expiries parser below using XLSX.
    }

    // --- ORDER EXPIRIES LOGIC (Direct Excel Reading) ---
    async function processExpiries() {
        const fileInput = document.getElementById('excelFile-exp');
        const date = document.getElementById('upload-date-exp').value;
        const statusDiv = document.getElementById('status-exp');
        
        if (!fileInput.files.length || !date) return alert("Select an Excel file AND date.");
        
        const file = fileInput.files[0];
        statusDiv.innerText = "Parsing Excel matrix data...";

        const reader = new FileReader();
        
        reader.onload = async function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                // Read the workbook preserving all characters and symbols
                const workbook = XLSX.read(data, {type: 'array'});
                
                // Grab the first sheet
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // Convert it to a 2D array (exactly like PapaParse did)
                const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1});

                if (rows.length < 3) {
                    statusDiv.innerText = "Error: File missing required data rows.";
                    return;
                }

                // 1. Identify columns from Row 0
                const headers = rows[0];
                const tickerMap = {}; 
                const corePortfolio = ['EUR/USD', 'GBP/USD', 'USD/JPY', 'AUD/USD', 'USD/CAD', 'EUR/GBP'];

                headers.forEach((header, index) => {
                    const h = String(header || '').trim();
                    if (corePortfolio.includes(h)) {
                        tickerMap[index] = h;
                    }
                });

                const flatData = [];
                // Regex remains the same. It will now safely read the intact € and £ symbols
                const regex = /([\d\.]+)\s*\([^\d]*([\d\.]+)([bm]+)\)/gi;

                // 2. Loop through the rows containing the daily expiry data (Starting at Row 2)
                for (let i = 2; i < rows.length; i++) {
                    const row = rows[i];

                    Object.keys(tickerMap).forEach(colIdx => {
                        const ticker = tickerMap[colIdx];
                        const cellString = row[colIdx];
                        
                        if (!cellString) return;

                        // 3. Extract strike and volume using Regex
                        let match;
                        while ((match = regex.exec(cellString)) !== null) {
                            const strike = parseFloat(match[1]);
                            let vol = parseFloat(match[2]);
                            const denomination = match[3].toLowerCase();

                            if (denomination.includes('m')) {
                                vol = vol / 1000;
                            }

                            flatData.push({
                                trade_date: date,
                                ticker: ticker,
                                strike: strike,
                                volume: parseFloat(vol.toFixed(3)) 
                            });
                        }
                    });
                }

                if (flatData.length === 0) {
                    statusDiv.innerText = "Error: No matching expiries found for core portfolio.";
                    return;
                }

                // 4. Send to Supabase
                statusDiv.innerText = `Pushing ${flatData.length} extracted levels to Supabase...`;
                
                await client.from('order_levels').delete().eq('trade_date', date);
                const { error } = await client.from('order_levels').insert(flatData);
                
                statusDiv.innerText = error ? "Error: " + error.message : `Success! Extracted and uploaded ${flatData.length} order levels directly from Excel.`;
                
            } catch (err) {
                statusDiv.innerText = "Error parsing Excel file: " + err.message;
            }
        };
        
        // Read the file as an ArrayBuffer to pass into SheetJS
        reader.readAsArrayBuffer(file);
    }
</script>
</body>
</html>
