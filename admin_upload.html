<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyst Wire | Admin Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background: #0f1115; color: white; padding: 40px; font-family: sans-serif; }
        .upload-container { max-width: 500px; background: #1a1d23; padding: 25px; border-radius: 8px; border: 1px solid #333; }
        input[type="file"] { margin: 20px 0; display: block; }
        button { background: #2962ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        #status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="upload-container">
        <h2>Upload Key Levels (CSV)</h2>
        <input type="file" id="csvFile" accept=".csv" />
        <button onclick="processUpload()">Upload & Process</button>
        <div id="status"></div>
        <a href="admin.html" style="color: #787b86; display: block; margin-top: 20px; font-size: 12px;">← Back to Admin</a>
    </div>

    <script>
        const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'YOUR_SUPABASE_KEY');

        async function init() {
            const { data: { session } } = await client.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            const { data: profile } = await client.from('profiles').select('is_admin').eq('id', session.user.id).single();
            if (!profile || profile.is_admin !== true) { window.location.href = 'terminal.html'; return; }
        }

        async function processUpload() {
            const file = document.getElementById('csvFile').files[0];
            const statusDiv = document.getElementById('status');
            
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                transformHeader: (h) => h.trim().replace(/\s+/g, ' '), // Clean headers
                complete: async (results) => {
                    // DEBUG: Check what the headers actually are
                    console.log("Detected Headers:", Object.keys(results.data[0]));

                    const cleanData = results.data.map(row => {
                        const getVal = (cell, label) => {
                            if (!cell) return 0;
                            const regex = new RegExp(`${label}:\\s*([\\d\\.]+)`);
                            const match = cell.match(regex);
                            return match ? parseFloat(match[1]) : 0;
                        };

                        return {
                            ticker: row['Ticker'] || row['ticker'],
                            bias: row['S.T. Bias'] || 'Neutral',
                            bull_bear_line: parseFloat(row['BULL/BEAR LINE']) || 0,
                            s1: getVal(row['SUPPORT'] || '', 'S1'),
                            s2: getVal(row['SUPPORT'] || '', 'S2'),
                            r1: getVal(row['RESISTANCE'] || '', 'R1'),
                            r2: getVal(row['RESISTANCE'] || '', 'R2'),
                            trade_date: new Date().toISOString().split('T')[0]
                        };
                    });

                    const { error } = await client.from('key_levels').insert(cleanData);
                    statusDiv.innerText = error ? "Error: " + error.message : "Success! Data Uploaded.";
                    if(error) console.error(error);
                }
            });
        }
        init();
    </script>
</body>
</html>
