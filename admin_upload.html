<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyst Wire | Admin Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background: #0f1115; color: white; padding: 40px; font-family: sans-serif; }
        .upload-container { max-width: 500px; background: #1a1d23; padding: 25px; border-radius: 8px; border: 1px solid #333; }
        input[type="file"], input[type="date"] { margin: 15px 0; display: block; width: 100%; padding: 8px; background: #1a1d23; color: white; border: 1px solid #333; }
        button { background: #2962ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        #status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="upload-container">
        <h2>Upload Key Levels</h2>
        <label>Select Date for this data:</label>
        <input type="date" id="upload-date">
        <input type="file" id="csvFile" accept=".csv" />
        <button onclick="processUpload()">Upload & Replace Data</button>
        <div id="status"></div>
        <a href="admin.html" style="color: #787b86; display: block; margin-top: 20px; font-size: 12px;">← Back to Admin</a>
    </div>

    <script>
        const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'YOUR_SUPABASE_KEY');

        function findVal(text, label) {
            if (!text) return 0;
            const regex = new RegExp(`${label}:\\s*([\\d\\.]+)`);
            const match = text.match(regex);
            return match ? parseFloat(match[1]) : 0;
        }

        async function processUpload() {
            const file = document.getElementById('csvFile').files[0];
            const date = document.getElementById('upload-date').value;
            const statusDiv = document.getElementById('status');
            if (!file || !date) return alert("Select file AND date.");

            Papa.parse(file, {
                header: false,
                skipEmptyLines: true,
                complete: async (results) => {
                    statusDiv.innerText = "Processing...";
                    
                    // 1. DELETE existing data for this date
                    await client.from('key_levels').delete().eq('trade_date', date);

                    // 2. Map and Insert (Filtered to skip invalid rows)
                    const cleanData = results.data.filter(row => Array.isArray(row) && row[0] && row[0] !== 'Ticker').map(row => ({
                        ticker: row[0],
                        bias: row[1] || 'Neutral',
                        s1: findVal(row[2] || '', 'S1'),
                        s2: findVal(row[2] || '', 'S2'),
                        r1: findVal(row[3] || '', 'R1'),
                        r2: findVal(row[3] || '', 'R2'),
                        bull_bear_line: parseFloat(row[4]) || 0,
                        trade_date: date
                    }));

                    const { error } = await client.from('key_levels').insert(cleanData);
                    statusDiv.innerText = error ? "Error: " + error.message : "Success! Data replaced for " + date;
                }
            });
        }
    </script>
</body>
</html>
