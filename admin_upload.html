<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyst Wire | Admin Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background: #0f1115; color: white; padding: 40px; font-family: sans-serif; }
        .upload-container { max-width: 500px; background: #1a1d23; padding: 25px; border-radius: 8px; border: 1px solid #333; }
        input[type="file"] { margin: 20px 0; display: block; }
        button { background: #2962ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1e4bd8; }
        #status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="upload-container">
        <h2>Upload Key Levels (CSV)</h2>
        <p style="color: #888; font-size: 13px;">Format: trade_date, ticker, s1, s2, r1, r2, bias, bull_bear_line</p>
        <input type="file" id="csvFile" accept=".csv" />
        <button onclick="processUpload()">Upload & Process</button>
        <div id="status"></div>
        <a href="admin.html" style="color: #787b86; display: block; margin-top: 20px; font-size: 12px;">← Back to Admin</a>
    </div>

    <script>
        const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

        async function init() {
            const { data: { session } } = await client.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }

            // ADMIN BOUNCER: Only allow access if is_admin is true
            const { data: profile } = await client.from('profiles').select('is_admin').eq('id', session.user.id).single();
            
            if (!profile || profile.is_admin !== true) {
                alert("Unauthorized: Admin access required.");
                window.location.href = 'terminal.html';
                return;
            }
        }

        async function processUpload() {
            const fileInput = document.getElementById('csvFile');
            const statusDiv = document.getElementById('status');
            if (!fileInput.files[0]) { alert("Please select a file first."); return; }

            statusDiv.innerText = "Processing...";

            Papa.parse(fileInput.files[0], {
                header: true,
                skipEmptyLines: true,
                complete: async (results) => {
                    // results.data is your array of objects
                    const { error } = await client.from('key_levels').insert(results.data);
                    
                    if (error) {
                        statusDiv.innerText = "Error: " + error.message;
                        statusDiv.style.color = "#f23645";
                    } else {
                        statusDiv.innerText = "Success! Data uploaded and old records cleared.";
                        statusDiv.style.color = "#089981";
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
