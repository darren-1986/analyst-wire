<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyst Wire | Admin Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background: #0f1115; color: white; padding: 0; margin: 0; font-family: sans-serif; padding-top: 70px; }
        
        /* Navigation Styles */
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: #131722; padding: 0 20px; height: 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2e39; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #787b86; text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .nav-links a.active { color: #2962ff; font-weight: bold; }
        
        .dropdown { position: relative; margin-left: 20px; }
        .dropbtn { background: none; border: none; color: #787b86; cursor: pointer; font-size: 18px; padding: 5px; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1c2230; min-width: 150px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); border: 1px solid #2a2e39; z-index: 1000; border-radius: 4px; }
        .dropdown-content a { color: #d1d4dc; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; margin: 0; cursor: pointer; }
        .dropdown-content a:hover { background-color: #2a2e39; }

        /* Upload Container Styles */
        .upload-container { max-width: 500px; margin: 0 auto; background: #1a1d23; padding: 25px; border-radius: 8px; border: 1px solid #333; }
        input[type="file"], input[type="date"] { margin: 15px 0; display: block; width: 100%; padding: 8px; background: #1a1d23; color: white; border: 1px solid #333; }
        button { background: #2962ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div style="height: 50px; display: flex; align-items: center;">
            <img src="assets/logo.png" alt="Analyst Wire" style="height: 40px;">
        </div>
        <div class="nav-links">
            <a href="terminal.html">Dashboard</a>
            <a href="/newsfeed">Newsfeed</a>
            <a href="key-levels.html">Key Levels</a>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleDropdown()">⚙️</button>
                <div id="settingsDropdown" class="dropdown-content">
                    <a href="account.html">Account</a>
                    <a href="admin.html" style="color:#2962ff;">Admin</a>
                    <a id="logoutBtn" style="color: #f23645; cursor: pointer;">Logout</a>
                </div>
            </div>
        </div>
    </div>

    <div class="upload-container">
        <h2>Upload Key Levels</h2>
        <label>Select Date:</label>
        <input type="date" id="upload-date">
        <input type="file" id="csvFile" accept=".csv" />
        <button onclick="processUpload()">Upload & Replace Data</button>
        <div id="status"></div>
    </div>

    <script>
        const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'YOUR_SUPABASE_KEY');

        // Navigation helpers
        function toggleDropdown() { document.getElementById("settingsDropdown").style.display = document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block"; }
        document.getElementById('logoutBtn').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'index.html'; });

        function findVal(rowArray, label) {
            if (!Array.isArray(rowArray)) return 0;
            const fullText = rowArray.join(" ");
            const regex = new RegExp(`${label}:\\s*([\\d\\.]+)`);
            const match = fullText.match(regex);
            return match ? parseFloat(match[1]) : 0;
        }

        async function processUpload() {
            const file = document.getElementById('csvFile').files[0];
            const date = document.getElementById('upload-date').value;
            if (!file || !date) return alert("Select file AND date.");

            Papa.parse(file, {
                header: false,
                skipEmptyLines: true,
                complete: async (results) => {
                    await client.from('key_levels').delete().eq('trade_date', date);

                    const cleanData = results.data.slice(1).filter(r => Array.isArray(r)).map(row => {
                        const s1 = findVal(row, 'S1');
                        const r1 = findVal(row, 'R1');
                        const bbl = parseFloat(row[4]) || 0;
                        const mid = (s1 + r1) / 2;
                        
                        const calculatedBias = (bbl > mid) ? '↑ Bullish' : (bbl < mid ? '↓ Bearish' : 'Neutral');

                        return {
                            ticker: row[0],
                            s1: s1,
                            s2: findVal(row, 'S2'),
                            r1: r1,
                            r2: findVal(row, 'R2'),
                            bias: calculatedBias,
                            bull_bear_line: bbl,
                            trade_date: date
                        };
                    });

                    const { error } = await client.from('key_levels').insert(cleanData);
                    document.getElementById('status').innerText = error ? "Error: " + error.message : "Success! Bias auto-calculated.";
                }
            });
        }
    </script>
</body>
</html>
