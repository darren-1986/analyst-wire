<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>Analyst Wire | Admin Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { background: #0f1115; color: white; font-family: sans-serif; margin: 0; }
        .top-nav { background: #1c2230; padding: 15px 20px; display: flex; gap: 20px; border-bottom: 2px solid #2a2e39; align-items: center; }
        .upload-container { max-width: 600px; margin: 40px auto; background: #1a1d23; padding: 25px; border-radius: 8px; border: 1px solid #333; }
        input[type="file"], input[type="date"] { margin: 15px 0; display: block; width: 100%; padding: 8px; background: #1a1d23; color: white; border: 1px solid #333; }
        button.action-btn { background: #2962ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .status-msg { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="upload-container">
    <h2>Upload Data</h2>
    <label>Select Date:</label>
    <input type="date" id="upload-date">
    <input type="file" id="excelFile" />
    <button class="action-btn" onclick="processData()">Upload Key Levels</button>
    <div id="status" class="status-msg"></div>
</div>

<script>
    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

    function parseFileToRows(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: null});
                    resolve(rows);
                } catch(err) { reject(err); }
            };
            reader.readAsArrayBuffer(file);
        });
    }

    async function processData() {
        const fileInput = document.getElementById('excelFile');
        const date = document.getElementById('upload-date').value;
        const statusDiv = document.getElementById('status');
        
        if (!fileInput.files.length || !date) return alert("Select a file and date.");
        statusDiv.innerText = "Processing...";

        try {
            const rows = await parseFileToRows(fileInput.files[0]);
            if (rows.length < 2) return statusDiv.innerText = "Error: File is empty.";

            const rawHeaders = rows[0];
            const formattedData = [];

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || !row[0]) continue; 

                let payloadObj = { trade_date: date };
                
                rawHeaders.forEach((header, idx) => {
                    if (!header) return;
                    let headerStr = String(header).toLowerCase().replace(/\n|\r/g, ' ').trim();
                    let dbKey = "";

                    if (headerStr === 'ticker') dbKey = 'ticker';
                    else if (headerStr.includes('previous') && headerStr.includes('bull')) dbKey = 'previous_bull_bear';
                    else if (headerStr.includes('bias')) dbKey = 'bias';
                    else if (headerStr === 'bull/bear') dbKey = 'bull/bear';
                    else if (headerStr === 's1') dbKey = 's1';
                    else if (headerStr === 'r1') dbKey = 'r1';
                    
                    if (dbKey && row[idx] !== null) payloadObj[dbKey] = String(row[idx]).trim();
                });
                
                if (payloadObj.ticker) formattedData.push(payloadObj);
            }

            await client.from('key_levels').delete().eq('trade_date', date);
            const { error } = await client.from('key_levels').insert(formattedData);
            
            statusDiv.innerText = error ? "Supabase Error: " + error.message : `Success! Uploaded ${formattedData.length} rows.`;
        } catch (err) { statusDiv.innerText = "Error: " + err.message; }
    }
</script>
</body>
</html>
