<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyst Wire | Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f1115; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .admin-container { max-width: 1400px; margin: 0 auto; background: #1a1d23; padding: 20px; border-radius: 8px; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .admin-table th, .admin-table td { padding: 12px; border-bottom: 1px solid #333; text-align: left; font-size: 0.9rem; }
        .status-active { color: #089981; font-weight: bold; }
        .status-cancelled { color: #f23645; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>User Management</h2>
    <table class="admin-table">
        <thead>
            <tr>
                <th>Full Name</th>
                <th>Email</th>
                <th>Tag</th>
                <th>Status</th>
                <th>Last Payment</th>
                <th>Next Billing</th>
                <th>Cancel Status</th>
            </tr>
        </thead>
        <tbody id="admin-table-body">
            <tr><td colspan="7">Loading data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY
');

    async function loadAdminTable() {
        const tableBody = document.getElementById('admin-table-body');
        
        try {
            console.log("Fetching user data...");
            
            // We use .select('*') temporarily to catch any column errors
            const { data: users, error } = await client
                .from('profiles')
                .select('*'); 

            if (error) throw new Error("Supabase Error: " + error.message);
            
            console.log("Data received:", users);

            tableBody.innerHTML = users.map(u => {
                const isCancelled = (u.cancel_at_period_end || '').toLowerCase().includes('cancel');
                
                return `
                    <tr>
                        <td>${u.full_name || '-'}</td>
                        <td>${u.email || '-'}</td>
                        <td>${u.subscription_tag || '-'}</td>
                        <td class="${isCancelled ? 'status-cancelled' : 'status-active'}">
                            ${(u.sub_status || 'active').toUpperCase()}
                        </td>
                        <td>${u.last_payment_date ? new Date(u.last_payment_date).toLocaleDateString() : '-'}</td>
                        <td>${u.current_period_end ? new Date(u.current_period_end).toLocaleDateString() : '-'}</td>
                        <td>${u.cancel_at_period_end || 'False'}</td>
                    </tr>
                `;
            }).join('');

        } catch (err) {
            console.error("Full Error:", err);
            tableBody.innerHTML = `<tr><td colspan="7" style="color: #ff4d4d; text-align: center;">Error: ${err.message}</td></tr>`;
        }
    }

    loadAdminTable();
</script>
</body>
</html>
