<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyst Wire | Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f1115; color: white; font-family: sans-serif; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: #1a1d23; border-radius: 8px; padding: 20px; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-box { padding: 8px; width: 300px; background: #242831; border: 1px solid #333; color: white; border-radius: 4px; }
        .nav-link { color: #089981; text-decoration: none; font-size: 0.9rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
        th { background: #242831; text-transform: uppercase; font-size: 0.75rem; color: #888; }
        
        .status-active { color: #089981; font-weight: bold; }
        .status-inactive { color: #f23645; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="controls">
        <h2>User Management</h2>
        <input type="text" id="search" class="search-box" placeholder="Search by name or email...">
        <a href="/terminal.html" class="nav-link">← Back to Terminal</a>
    </div>

    <table id="admin-table">
        <thead>
            <tr>
                <th>Name</th><th>Email</th><th>Tag</th><th>Status</th><th>Last Payment</th><th>Next Billing</th><th>Cancel?</th>
            </tr>
        </thead>
        <tbody id="admin-body">
            <tr><td colspan="7" style="text-align:center;">Loading...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // REPLACE THIS WITH YOUR REGENERATED ANON KEY
    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');
    
    let allUsers = []; 

    async function init() {
        const tbody = document.getElementById('admin-body');
        const { data, error } = await client.from('profiles').select('*');
        
        if (error) {
            tbody.innerHTML = `<tr><td colspan="7" style="color:red">Error: ${error.message}</td></tr>`;
            return;
        }
        
        allUsers = data;
        renderTable(allUsers);
    }

    function renderTable(users) {
        const tbody = document.getElementById('admin-body');
        tbody.innerHTML = users.map(u => {
            const status = (u.sub_status || 'active').toLowerCase();
            const isActive = status === 'active';

            // New Logic for Cancel Column
            const cancelVal = (u.cancel_at_period_end || '').toLowerCase();
            const isCancelRed = cancelVal.includes('cancel');
            
            return `
                <tr>
                    <td>${u.full_name || '-'}</td>
                    <td>${u.email || '-'}</td>
                    <td>${u.subscription_tag || '-'}</td>
                    <td class="${isActive ? 'status-active' : 'status-inactive'}">
                        ${status.toUpperCase()}
                    </td>
                    <td>${u.last_payment_date ? new Date(u.last_payment_date).toLocaleDateString() : '-'}</td>
                    <td>${u.current_period_end ? new Date(u.current_period_end).toLocaleDateString() : '-'}</td>
                    <td class="${isCancelRed ? 'status-inactive' : 'status-active'}">
                        ${u.cancel_at_period_end || 'False'}
                    </td>
                </tr>
            `;
        }).join('');
    }

    document.getElementById('search').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allUsers.filter(u => 
            (u.full_name?.toLowerCase().includes(term)) || 
            (u.email?.toLowerCase().includes(term))
        );
        renderTable(filtered);
    });

    init();
</script>
</body>
</html>
