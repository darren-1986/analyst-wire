<script>
    // --- Tab Switching Logic ---
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.remove('active');
        });
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- Navigation Dropdown ---
    function toggleDropdown() {
        document.getElementById("settingsDropdown").style.display = 
            document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block";
    }

    // --- Supabase Security & Auth ---
    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');
    
    async function fetchTradeIdeas() {
        const container = document.getElementById('trade-ideas-container');
        
        const { data, error } = await client
            .from('trade_ideas')
            .select('*')
            .order('last_updated', { ascending: false });

        if (error) {
            console.error("Error fetching trade ideas:", error);
            container.innerHTML = `<p style="color: #f85149;">Error loading trade ideas.</p>`;
            return;
        }

        if (!data || data.length === 0) {
            container.innerHTML = `<p style="color: #8b949e;">No trade ideas available at this time.</p>`;
            return;
        }

        container.innerHTML = ''; 

        data.forEach(trade => {
            const dirText = (trade.direction || '').toLowerCase();
            const isLong = dirText.includes('long') || dirText.includes('call') || dirText.includes('buy');
            const dirClass = isLong ? 'dir-long' : 'dir-short';
            
            // ENFORCED BADGE FORMATTING: Never let the badge expand beyond one word
            let displayDir = 'N/A';
            if (isLong) displayDir = 'LONG';
            else if (dirText.includes('short') || dirText.includes('sell') || dirText.includes('put')) displayDir = 'SHORT';
            else displayDir = (trade.direction || 'N/A').split(' ')[0].toUpperCase();
            
            let levelsHtml = '';
            if (trade.entry) levelsHtml += `<div class="level-box"><span class="level-label">Entry</span><span class="level-val">${trade.entry}</span></div>`;
            if (trade.strike) levelsHtml += `<div class="level-box"><span class="level-label">Strike</span><span class="level-val">${trade.strike}</span></div>`;
            if (trade.target) levelsHtml += `<div class="level-box"><span class="level-label">Target</span><span class="level-val">${trade.target}</span></div>`;
            if (trade.stop_loss) levelsHtml += `<div class="level-box"><span class="level-label">Stop Loss</span><span class="level-val">${trade.stop_loss}</span></div>`;

            const card = document.createElement('div');
            card.className = 'trade-card';
            
            let html = `
                <div class="trade-header">
                    <div>
                        <span class="trade-ticker">${trade.instrument || 'Trade Setup'}</span>
                        <div style="font-size: 11px; color: #8b949e; margin-top: 4px;">${trade.trade_date || ''} ${trade.title ? '— ' + trade.title : ''}</div>
                    </div>
                    <span class="trade-direction ${dirClass}">${displayDir}</span>
                </div>
            `;
            
            if (levelsHtml) {
                html += `<div class="trade-levels">${levelsHtml}</div>`;
            }

            if (trade.key_levels) {
                html += `<p style="font-size: 13px; color: #8b949e; margin: 20px 0 5px 0; line-height: 1.5;"><strong>Key Levels:</strong> ${trade.key_levels}</p>`;
            }
            
            if (trade.rationale) {
                html += `<p style="font-size: 13px; color: #8b949e; margin: 15px 0 5px 0; line-height: 1.5;"><strong>Rationale:</strong> ${trade.rationale}</p>`;
            }
            
            if (trade.conditions) {
                html += `<p style="font-size: 13px; color: #8b949e; margin: 10px 0 0 0; line-height: 1.5;"><strong>Conditions:</strong> ${trade.conditions}</p>`;
            }

            card.innerHTML = html;
            container.appendChild(card);
        });
    }

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'index.html'; return; }
        
        const { data: profile } = await client.from('profiles').select('is_admin, subscription_tag').eq('id', session.user.id).single();
        if (!profile || profile.subscription_tag === 'free') {
            alert("Your subscription is inactive. Redirecting to login.");
            await client.auth.signOut();
            window.location.href = 'index.html';
            return;
        }
        
        if (profile) {
            if (profile.is_admin === true) {
                document.getElementById('nav-admin').style.display = 'block';
                document.getElementById('nav-upload').style.display = 'block';
            }
            if (profile.is_admin === true || profile.subscription_tag === 'pro') {
                document.getElementById('nav-courses').style.display = 'block';
                document.getElementById('nav-key-levels').style.display = 'block';
            }
        }

        fetchTradeIdeas();
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => { 
        await client.auth.signOut(); 
        window.location.href = 'index.html'; 
    });

    init();
</script>
