<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>Analyst Wire | Courses</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000000; color: #d1d4dc; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Top Navigation */
        .top-nav { background: #131722; padding: 0 20px; height: 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2e39; position: relative; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #787b86; text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
        .nav-links a:hover { color: #d1d4dc; }
        .nav-links a.active { color: #2962ff; font-weight: bold; }

        /* Dropdown Styling */
        .dropdown { position: relative; margin-left: 20px; }
        .dropbtn { background: none; border: none; color: #787b86; cursor: pointer; font-size: 18px; padding: 5px; }
        .dropbtn:hover { color: #fff; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1c2230; min-width: 150px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); border: 1px solid #2a2e39; z-index: 1000; border-radius: 4px; }
        .dropdown-content a { color: #d1d4dc; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; margin: 0; cursor: pointer; }
        .dropdown-content a:hover { background-color: #2a2e39; }

        /* Course Layout */
        .page-container { display: flex; flex-grow: 1; overflow: hidden; }
        .sidebar { width: 320px; background: #0b0e14; border-right: 1px solid #2a2e39; overflow-y: auto; }
        .video-content { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .video-container { width: 100%; max-width: 900px; }
        
        /* Sidebar Elements */
        .sidebar-header { padding: 20px; }
        .module-header { padding: 15px 20px; background: #131722; cursor: pointer; font-weight: bold; font-size: 13px; border-bottom: 1px solid #2a2e39; display: flex; justify-content: space-between; }
        .module-header:hover { background: #1c2230; }
        .lesson-list { display: none; background: #0b0e14; }
        .lesson-list.active { display: block; }
        .lesson-item { padding: 12px 20px; cursor: pointer; color: #787b86; font-size: 14px; border-bottom: 1px solid #1c2230; }
        .lesson-item:hover { color: #fff; background: #1c2230; }
        .lesson-item.active { color: #2962ff; border-left: 3px solid #2962ff; }
    </style>
</head>
<body>

<div class="top-nav">
    <div style="height: 50px; display: flex; align-items: center; justify-content: center; box-sizing: border-box; padding: 5px 0;">
        <img src="assets/logo.png" alt="Analyst Wire" style="height: 40px; width: auto; object-fit: contain; display: block;">
    </div>
    <div class="nav-links">
        <a href="terminal.html">Dashboard</a>
        <a href="/newsfeed">Newsfeed</a>
        <a href="courses.html" class="active">Courses</a>
        <a id="nav-key-levels" href="key-levels.html" style="display: none;">Key Levels</a>
        <div class="dropdown">
            <button class="dropbtn" onclick="toggleDropdown()">⚙️</button>
            <div id="settingsDropdown" class="dropdown-content">
                <a href="account.html">Account</a>
                <a id="nav-admin" style="display: none;" href="admin.html">Admin</a>
                <a id="logoutBtn" style="color: #f23645; cursor: pointer;">Logout</a>
            </div>
        </div>
    </div>
</div>

<div class="page-container">
    <div class="sidebar" id="sidebar">
        </div>

    <div class="video-content">
        <div class="video-container">
            <iframe id="main-player"
                src="https://player.mux.com/GfaPZCUcaIwYRCWKJB3QxKF01I74grPH3ELWFYNAr5Pg?metadata-video-title=Global_Financial_Markets+Part+1&video-title=Global_Financial_Markets+Part+1"
                style="width: 100%; border: none; aspect-ratio: 16/9; border-radius: 8px;"
                allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
                allowfullscreen>
            </iframe>
            <h1 id="video-title" style="margin-top: 20px;">What Are Financial Markets</h1>
            <p id="video-meta" style="color: #787b86;">Part 1 of the Macro Fundamentals Masterclass</p>
        </div>
    </div>
</div>

<script>
    // --- COURSE DATA ---
    // You can easily add your video URLs and Titles here
    const courseData = [
        { title: "1. Laying The Groundwork", lessons: [
            { title: "What Are Financial Markets", src: "https://player.mux.com/GfaPZCUcaIwYRCWKJB3QxKF01I74grPH3ELWFYNAr5Pg", duration: "5:17" },
            { title: "Global Macro Connection", src: "https://player.mux.com/vtkhuEii1gsyt00uw2X7fj4UBOdZu8vw5b601pDcQ1RCU", duration: "4:00" },
            { title: "Everything Is Connected", src: "https://player.mux.com/GfaPZCUcaIwYRCWKJB3QxKF01I74grPH3ELWFYNAr5Pg", duration: "3:28" },
            { title: "Raw Basics Of Fundamentals", src: "https://player.mux.com/GfaPZCUcaIwYRCWKJB3QxKF01I74grPH3ELWFYNAr5Pg", duration: "4:36" },
            { title: "What Moves Markets", src: "https://player.mux.com/GfaPZCUcaIwYRCWKJB3QxKF01I74grPH3ELWFYNAr5Pg", duration: "6:20" }
        ]},
        { title: "2. Practical Economics", lessons: [{title: "Inflation Metrics", src: "...", duration: "6:12"}, {title: "Lesson 2", src: "...", duration: "5:00"}, {title: "Lesson 3", src: "...", duration: "5:00"}, {title: "Lesson 4", src: "...", duration: "5:00"}, {title: "Lesson 5", src: "...", duration: "5:00"}]},
        { title: "3. Central Banks", lessons: Array(5).fill({title: "Lesson", src: "...", duration: "5:00"}) },
        { title: "4. Sentiment", lessons: Array(5).fill({title: "Lesson", src: "...", duration: "5:00"}) },
        { title: "5. Fixed Income", lessons: Array(5).fill({title: "Lesson", src: "...", duration: "5:00"}) },
        { title: "6. Foreign Exchange", lessons: Array(5).fill({title: "Lesson", src: "...", duration: "5:00"}) },
        { title: "7. Equities", lessons: Array(5).fill({title: "Lesson", src: "...", duration: "5:00"}) },
        { title: "8. Commodities", lessons: Array(5).fill({title: "Lesson", src: "...", duration: "5:00"}) },
        { title: "9. Tips, Tools & Tricks", lessons: Array(5).fill({title: "Lesson", src: "...", duration: "5:00"}) }
    ];

    // --- RENDER SIDEBAR ---
    const sidebar = document.getElementById('sidebar');
    courseData.forEach((mod, mIdx) => {
        const modEl = document.createElement('div');
        modEl.innerHTML = `
            <div class="module-header" onclick="toggleModule(${mIdx})">${mod.title}</div>
            <div class="lesson-list" id="mod-${mIdx}">
                ${mod.lessons.map((less, lIdx) => `<div class="lesson-item" onclick="loadVideo('${less.src}', '${less.title}', this)">${less.title}</div>`).join('')}
            </div>
        `;
        sidebar.appendChild(modEl);
    });

    function toggleModule(idx) { document.getElementById(`mod-${idx}`).classList.toggle('active'); }

    function loadVideo(src, title, el) {
        document.getElementById('main-player').src = src;
        document.getElementById('video-title').innerText = title;
        document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    // --- AUTH & NAV ---
    function toggleDropdown() { document.getElementById("settingsDropdown").style.display = (document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block"); }
    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', ''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'index.html'; return; }
        const { data: profile } = await client.from('profiles').select('is_admin, subscription_tag').eq('id', session.user.id).single();

        if (!profile || (profile.is_admin !== true && profile.subscription_tag !== 'pro')) {
            alert("Access Denied.");
            await client.auth.signOut();
            window.location.href = 'index.html';
            return;
        }

        if (profile.is_admin === true) document.getElementById('nav-admin').style.display = 'block';
        if (profile.is_admin === true || profile.subscription_tag === 'pro') document.getElementById('nav-key-levels').style.display = 'block';
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'index.html'; });
    init();
</script>

</body>
</html>
