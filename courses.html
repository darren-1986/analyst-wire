<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>Analyst Wire | Courses</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000000; color: #d1d4dc; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navigation */
        .top-nav { background: #131722; padding: 0 20px; height: 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2e39; z-index: 1001; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #787b86; text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
        .nav-links a:hover { color: #d1d4dc; }
        .nav-links a.active { color: #2962ff; font-weight: bold; }

        /* Dropdown */
        .dropdown { position: relative; margin-left: 20px; }
        .dropbtn { background: none; border: none; color: #787b86; cursor: pointer; font-size: 18px; padding: 5px; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1c2230; min-width: 150px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); border: 1px solid #2a2e39; z-index: 1000; border-radius: 4px; }
        .dropdown-content a { color: #d1d4dc; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; margin: 0; cursor: pointer; }
        .dropdown-content a:hover { background-color: #2a2e39; }

        /* Layout */
        .page-container { display: flex; flex-grow: 1; overflow: hidden; }
        .sidebar { width: 320px; min-width: 320px; background: #0b0e14; border-right: 1px solid #2a2e39; overflow-y: auto; }
        .sidebar h3 { color: white; padding: 20px; font-size: 16px; margin: 0; border-bottom: 1px solid #2a2e39; }
        
        .video-content { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .video-container { width: 100%; max-width: 900px; }
        
        /* Iframe */
        .lesson-iframe { display: block; width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px; background: #000; }
        
        /* Module Headers */
        .module-header { padding: 15px 20px; background: #131722; cursor: pointer; font-weight: bold; font-size: 13px; border-bottom: 1px solid #2a2e39; color: #787b86; transition: 0.2s; }
        .module-header:hover { background: #1c2230; color: #d1d4dc; }
        .module-header.active { color: #2962ff; border-left: 3px solid #2962ff; background: #161a22; }
        
        /* Reference List */
        .lesson-reference { background: #131722; padding: 20px; margin-top: 20px; border-radius: 8px; width: 100%; }
        .ref-item { padding: 8px 0; border-bottom: 1px solid #2a2e39; font-size: 14px; }
        .ref-time { color: #2962ff; font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>

<div class="top-nav">
    <div style="height: 50px; display: flex; align-items: center;">
        <img src="assets/logo.png" alt="Analyst Wire" style="height: 40px; width: auto; object-fit: contain;">
    </div>
    <div class="nav-links">
        <a href="terminal.html">Dashboard</a>
        <a href="/newsfeed">Newsfeed</a>
        <a href="courses.html" class="active">Courses</a>
        <a id="nav-key-levels" href="key-levels.html" style="display: none;">Key Levels</a>
        <div class="dropdown">
            <button class="dropbtn" onclick="toggleDropdown()">⚙️</button>
            <div id="settingsDropdown" class="dropdown-content">
                <a href="account.html">Account</a>
                <a id="nav-admin" style="display: none;" href="admin.html">Admin</a>
                <a id="logoutBtn" style="color: #f23645; cursor: pointer;">Logout</a>
            </div>
        </div>
    </div>
</div>

<div class="page-container">
    <div class="sidebar" id="sidebar">
        <h3>The Macro-Fundamental Analyst Program</h3>
    </div>

    <div class="video-content">
        <div class="video-container">
            <iframe id="lesson-player" class="lesson-iframe" src="" allow="autoplay; fullscreen" allowfullscreen width="960" height="540" frameborder="0"></iframe>
            <h1 id="module-title" style="margin-top: 20px;">Select a Module</h1>
            <div id="lesson-ref-list" class="lesson-reference">Select a module to view lesson references.</div>
        </div>
    </div>
</div>

<script>
    const courseData = [
        { title: "1. Module One", video: "https://fast.wistia.net/embed/iframe/z4ly46xelg", lessons: [
            { title: "Financial Market", time: "11s", summary: "Market structure basics." },
            { title: "Macro Connection", time: "497s", summary: "Global economic linkages." },
            { title: "Intrinsic Compass", time: "940s", summary: "Navigating market value." },
            { title: "The Market Machine", time: "1347s", summary: "Understanding order flow." },
            { title: "Market Driver", time: "1962s", summary: "Identifying key catalysts." },
            { title: "FX Participant Hierarchy", time: "2395s", summary: "Institutional vs Retail." },
            { title: "Master Market Moves", time: "2728s", summary: "Analyzing trend changes." },
            { title: "Market Sentiment Foundations", time: "3259s", summary: "Psychology of the market." }
        ]},
        ...Array.from({length: 8}, (_, i) => ({
            title: `${i + 2}. Module ${['Two','Three','Four','Five','Six','Seven','Eight','Nine'][i]}`,
            video: "https://fast.wistia.net/embed/iframe/z4ly46xelg",
            lessons: Array.from({length: 15}, (_, l) => ({ title: `Lesson ${l+1}`, time: "0s", summary: "Placeholder description." }))
        }))
    ];

    const sidebar = document.getElementById('sidebar');
    courseData.forEach((mod, mIdx) => {
        const modEl = document.createElement('div');
        modEl.id = `mod-header-${mIdx}`;
        modEl.className = "module-header";
        modEl.innerText = mod.title;
        modEl.onclick = () => selectModule(mIdx);
        sidebar.appendChild(modEl);
    });

    function selectModule(idx) {
        const mod = courseData[idx];
        const player = document.getElementById('lesson-player');
        
        // Highlight active
        document.querySelectorAll('.module-header').forEach(el => el.classList.remove('active'));
        document.getElementById(`mod-header-${idx}`).classList.add('active');

        // Update Video
        player.src = `${mod.video}?wtime=${mod.lessons[0].time}&resume=false&videoFoam=true&_t=${Date.now()}`;
        document.getElementById('module-title').innerText = mod.title;
        
        // Update List
        const list = document.getElementById('lesson-ref-list');
        list.innerHTML = mod.lessons.map(l => `
            <div class="ref-item">
                <span class="ref-time">${l.time}</span> <strong>${l.title}</strong>: ${l.summary}
            </div>
        `).join('');
    }

    // --- AUTH & NAV ---
    function toggleDropdown() { document.getElementById("settingsDropdown").style.display = (document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block"); }
    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'index.html'; return; }
        const { data: profile } = await client.from('profiles').select('is_admin, subscription_tag').eq('id', session.user.id).single();
        if (!profile || (profile.is_admin !== true && profile.subscription_tag !== 'pro')) {
            alert("Access Denied.");
            await client.auth.signOut();
            window.location.href = 'index.html';
            return;
        }
        if (profile.is_admin === true) document.getElementById('nav-admin').style.display = 'block';
        if (profile.is_admin === true || profile.subscription_tag === 'pro') document.getElementById('nav-key-levels').style.display = 'block';
    }
    document.getElementById('logoutBtn').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'index.html'; });
    init();
</script>
</body>
</html>
