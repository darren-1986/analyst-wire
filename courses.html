<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>Analyst Wire | Courses</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000000; color: #d1d4dc; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navigation */
        .top-nav { background: #131722; padding: 0 20px; height: 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2e39; z-index: 1001; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #787b86; text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
        .nav-links a:hover { color: #d1d4dc; }
        .nav-links a.active { color: #2962ff; font-weight: bold; }

        /* Dropdown */
        .dropdown { position: relative; margin-left: 20px; }
        .dropbtn { background: none; border: none; color: #787b86; cursor: pointer; font-size: 18px; padding: 5px; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1c2230; min-width: 150px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); border: 1px solid #2a2e39; z-index: 1000; border-radius: 4px; }
        .dropdown-content a { color: #d1d4dc; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; margin: 0; cursor: pointer; }
        .dropdown-content a:hover { background-color: #2a2e39; }

        /* Layout */
        .page-container { display: flex; flex-grow: 1; overflow: hidden; }
        .sidebar { width: 320px; min-width: 320px; background: #0b0e14; border-right: 1px solid #2a2e39; overflow-y: auto; }
        .sidebar h3 { color: white; padding: 20px; font-size: 16px; margin: 0; border-bottom: 1px solid #2a2e39; }
        
        .video-content { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .video-container { width: 100%; max-width: 900px; position: relative; }
        
        /* Iframe Styles */
        .lesson-iframe { display: none; width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px; background: #000; }
        .lesson-iframe.active { display: block; }
        
        /* Modules */
        .module-header { padding: 15px 20px; background: #131722; cursor: pointer; font-weight: bold; font-size: 13px; border-bottom: 1px solid #2a2e39; color: #d1d4dc; user-select: none; }
        .module-header:hover { background: #1c2230; }
        .lesson-list { display: none; background: #0b0e14; border-bottom: 1px solid #2a2e39; }
        .lesson-list.active { display: block; }
        .lesson-item { padding: 12px 20px 12px 35px; cursor: pointer; color: #787b86; font-size: 13px; border-bottom: 1px solid #161a22; }
        .lesson-item:hover { color: #fff; background: #161a22; }
        .lesson-item.active { color: #2962ff; border-left: 3px solid #2962ff; background: #161a22; }
    </style>
</head>
<body>

<div class="top-nav">
    <div style="height: 50px; display: flex; align-items: center;">
        <img src="assets/logo.png" alt="Analyst Wire" style="height: 40px; width: auto; object-fit: contain;">
    </div>
    <div class="nav-links">
        <a href="terminal.html">Dashboard</a>
        <a href="/newsfeed">Newsfeed</a>
        <a href="courses.html" class="active">Courses</a>
        <a id="nav-key-levels" href="key-levels.html" style="display: none;">Key Levels</a>
        <div class="dropdown">
            <button class="dropbtn" onclick="toggleDropdown()">⚙️</button>
            <div id="settingsDropdown" class="dropdown-content">
                <a href="account.html">Account</a>
                <a id="nav-admin" style="display: none;" href="admin.html">Admin</a>
                <a id="logoutBtn" style="color: #f23645; cursor: pointer;">Logout</a>
            </div>
        </div>
    </div>
</div>

<div class="page-container">
    <div class="sidebar" id="sidebar">
        <h3>The Macro-Fundamental Analyst Program</h3>
    </div>

    <div class="video-content">
        <div class="video-container" id="video-wrapper">
            <iframe id="iframe-0" class="lesson-iframe active" src="https://analyst-wire-1.wistia.com/s/adta4iwh2c129uo?wtime=11s" allow="autoplay; fullscreen" allowfullscreen></iframe>
            <iframe id="iframe-1" class="lesson-iframe" src="https://analyst-wire-1.wistia.com/s/adta4iwh2c129uo?wtime=7m17s" allow="autoplay; fullscreen" allowfullscreen></iframe>
            <iframe id="iframe-2" class="lesson-iframe" src="https://analyst-wire-1.wistia.com/s/adta4iwh2c129uo?wtime=15m40s" allow="autoplay; fullscreen" allowfullscreen></iframe>
            <iframe id="iframe-3" class="lesson-iframe" src="https://analyst-wire-1.wistia.com/s/adta4iwh2c129uo?wtime=22m27s" allow="autoplay; fullscreen" allowfullscreen></iframe>
            <iframe id="iframe-4" class="lesson-iframe" src="https://analyst-wire-1.wistia.com/s/adta4iwh2c129uo?wtime=32m42s" allow="autoplay; fullscreen" allowfullscreen></iframe>
            <iframe id="iframe-5" class="lesson-iframe" src="https://analyst-wire-1.wistia.com/s/adta4iwh2c129uo?wtime=39m55s" allow="autoplay; fullscreen" allowfullscreen></iframe>
            <iframe id="iframe-6" class="lesson-iframe" src="https://analyst-wire-1.wistia.com/s/adta4iwh2c129uo?wtime=45m28s" allow="autoplay; fullscreen" allowfullscreen></iframe>
            <iframe id="iframe-7" class="lesson-iframe" src="https://analyst-wire-1.wistia.com/s/adta4iwh2c129uo?wtime=54m19s" allow="autoplay; fullscreen" allowfullscreen></iframe>
            
            <h1 id="video-title" style="margin-top: 20px;">Module 1 - Lesson 1</h1>
        </div>
    </div>
</div>

<script>
    // --- COURSE DATA ---
    const courseData = [
        { title: "1. Module One", lessons: ["Lesson 1", "Lesson 2", "Lesson 3", "Lesson 4", "Lesson 5", "Lesson 6", "Lesson 7", "Lesson 8"] },
        { title: "2. Module Two", lessons: ["Lesson"] },
        { title: "3. Module Three", lessons: ["Lesson"] },
        { title: "4. Module Four", lessons: ["Lesson"] },
        { title: "5. Module Five", lessons: ["Lesson"] },
        { title: "6. Module Six", lessons: ["Lesson"] },
        { title: "7. Module Seven", lessons: ["Lesson"] },
        { title: "8. Module Eight", lessons: ["Lesson"] },
        { title: "9. Module Nine", lessons: ["Lesson"] }
    ];

    const sidebar = document.getElementById('sidebar');
    courseData.forEach((mod, mIdx) => {
        const modEl = document.createElement('div');
        modEl.innerHTML = `
            <div class="module-header" onclick="toggleModule(${mIdx})">${mod.title}</div>
            <div class="lesson-list" id="mod-${mIdx}">
                ${mod.lessons.map((less, lIdx) => `<div class="lesson-item" onclick="switchLesson(${lIdx}, '${mod.title} - ${less}', this)">${less}</div>`).join('')}
            </div>
        `;
        sidebar.appendChild(modEl);
    });

    function toggleModule(idx) { document.getElementById(`mod-${idx}`).classList.toggle('active'); }

    // --- SWITCH LESSON ---
    function switchLesson(idx, title, el) {
        // Hide all iframes
        document.querySelectorAll('.lesson-iframe').forEach(i => i.classList.remove('active'));
        // Show selected
        document.getElementById(`iframe-${idx}`).classList.add('active');
        
        document.getElementById('video-title').innerText = title;
        document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    // --- AUTH & NAV ---
    function toggleDropdown() { document.getElementById("settingsDropdown").style.display = (document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block"); }
    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'index.html'; return; }
        const { data: profile } = await client.from('profiles').select('is_admin, subscription_tag').eq('id', session.user.id).single();
        if (!profile || (profile.is_admin !== true && profile.subscription_tag !== 'pro')) {
            alert("Access Denied.");
            await client.auth.signOut();
            window.location.href = 'index.html';
            return;
        }
        if (profile.is_admin === true) document.getElementById('nav-admin').style.display = 'block';
        if (profile.is_admin === true || profile.subscription_tag === 'pro') document.getElementById('nav-key-levels').style.display = 'block';
    }
    document.getElementById('logoutBtn').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'index.html'; });
    init();
</script>
</body>
</html>
