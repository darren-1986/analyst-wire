<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Claim Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 8px; text-align: center; width: 100%; max-width: 400px; }
        input { padding: 12px; width: 100%; box-sizing: border-box; margin: 10px 0 20px 0; color: black; border-radius: 4px; border: none; }
        button { padding: 12px 20px; cursor: pointer; width: 100%; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #0056b3; }
        #status { margin-top: 15px; color: #b3b3b3; }
    </style>
</head>
<body>

<div class="container">
    <img src="media/squawkimage.png" alt="Company Logo" style="max-width: 150px; margin-bottom: 20px;">
    <h2>Claim Terminal Access</h2>
    <input type="email" id="email" placeholder="Enter your Stripe email">
    <button id="claimBtn">Send Access Link</button>
    <p id="status"></p>
</div>

<script>
    // --- STOP AND READ THIS SECTION ---

    // 1. SUPABASE URL (DO NOT CHANGE THIS - I ALREADY ADDED IT FOR YOU)
    const SUPABASE_URL = 'https://fgidelsazisdqjfckerd.supabase.co';
    
    // 2. SUPABASE ANON KEY (YOU MUST CHANGE THIS)
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY';
    
    // ----------------------------------

    if (typeof supabase === 'undefined') {
        document.getElementById('status').innerText = "Error: Supabase library failed to load.";
    } else {
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('claimBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const status = document.getElementById('status');
            
            if (!email) {
                alert('Please enter an email');
                return;
            }

            status.innerText = "Sending...";

            const { error } = await client.auth.signInWithOtp({
                email: email,
                options: {
                    // 3. REDIRECT URL (DO NOT CHANGE THIS - I ALREADY ADDED IT FOR YOU)
                    emailRedirectTo: 'https://analyst-wire.pages.dev/setup.html'
                }
            });

            if (error) {
                status.innerText = "Error: " + error.message;
            } else {
                status.innerText = "Success! Check your email for the login link.";
            }
        });
    }
</script>

</body>
</html>
