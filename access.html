<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Claim Access</title>
    <!-- Use a specific, stable version of the Supabase library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 8px; text-align: center; }
        input { padding: 10px; width: 250px; display: block; margin: 10px auto; color: black; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Claim Terminal Access</h2>
    <input type="email" id="email" placeholder="Enter your Stripe email">
    <button id="claimBtn">Send Access Link</button>
    <p id="status"></p>
</div>

<script>
    // 1. Initialize (REPLACE THESE KEYS)
    const SUPABASE_URL = 'https://supabase.com/dashboard/project/fgidelsazisdqjfckerd';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY';
    
    // Add a check to ensure Supabase is loaded
    if (typeof supabase === 'undefined') {
        document.getElementById('status').innerText = "Error: Supabase library failed to load.";
    } else {
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. Add event listener to the button
        document.getElementById('claimBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const status = document.getElementById('status');
            
            if (!email) {
                alert('Please enter an email');
                return;
            }

            status.innerText = "Sending...";

            const { error } = await client.auth.signInWithOtp({
                email: email,
                options: {
                    emailRedirectTo: 'https://analyst-wire.pages.dev/'
                }
            });

            if (error) {
                status.innerText = "Error: " + error.message;
            } else {
                status.innerText = "Success! Check your email for the login link.";
            }
        });
    }
</script>

</body>
</html>
