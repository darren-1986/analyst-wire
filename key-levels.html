<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>Analyst Wire | Key Levels</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000000; color: #d1d4dc; margin: 0; min-height: 100vh; }
        .top-nav { background: #131722; padding: 0 20px; height: 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2e39; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #787b86; text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .nav-links a.active { color: #2962ff; font-weight: bold; }
        .dropdown { position: relative; margin-left: 20px; }
        .dropbtn { background: none; border: none; color: #787b86; cursor: pointer; font-size: 18px; padding: 5px; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1c2230; min-width: 150px; border: 1px solid #2a2e39; z-index: 1000; border-radius: 4px; }
        .dropdown-content a { color: #d1d4dc; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; cursor: pointer; }
        .dropdown-content a:hover { background-color: #2a2e39; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); }
        .modal-content { background-color: #131722; margin: 5% auto; padding: 30px; border: 1px solid #2a2e39; width: 80%; max-width: 700px; color: #d1d4dc; border-radius: 8px; max-height: 80vh; overflow-y: auto; }
        .close-btn { color: #787b86; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .container { padding: 30px; }
        .filter-section { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        select, input[type="date"] { background: #131722; color: white; padding: 8px; border: 1px solid #2a2e39; border-radius: 4px; }
        .info-btn { background: #2962ff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 14px; margin-left: 10px; }
        table { width: 100%; border-collapse: collapse; background: #131722; margin-top: 20px; border: 1px solid #2a2e39; }
        th { background: #1c2230; padding: 12px; text-align: left; border: 1px solid #2a2e39; color: #787b86; font-size: 11px; text-transform: uppercase; cursor: pointer; }
        td { padding: 12px; border: 1px solid #2a2e39; color: #fff; font-size: 14px; }
        .bias-up { color: #089981; font-weight: bold; }
        .bias-down { color: #f23645; font-weight: bold; }
        .range-badge { background: #2a2e39; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 12px; }
        .state-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
        .trending { background: #2962ff; color: white; }
        .consolidated { background: #5d606b; color: white; }
        .live-price-cell { font-family: monospace; color: #ffffff; font-weight: bold; min-width: 90px; }
    </style>
</head>
<body>
<div id="infoModal" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeModal()">&times;</span><h2>How to Use the Radar</h2><p>Bias is computed live vs pivot.</p></div></div>
<div class="top-nav">
    <div style="height: 50px; display: flex; align-items: center;"><img src="assets/logo.png" alt="Analyst Wire" style="height: 40px;"></div>
    <div class="nav-links">
        <a href="terminal.html">Dashboard</a><a href="/newsfeed">Newsfeed</a><a href="key-levels.html" class="active">Key Levels</a>
        <a id="nav-courses" href="courses.html" style="display: none;">Courses</a>
        <div class="dropdown"><button class="dropbtn" onclick="toggleDropdown()">⚙️</button>
            <div id="settingsDropdown" class="dropdown-content">
                <a href="account.html">Account</a>
                <a id="nav-admin" style="display: none;" href="admin.html">Admin</a>
                <a id="nav-upload" style="display: none;" href="admin_upload.html">Upload Data</a>
                <a id="logoutBtn" style="color: #f23645; cursor: pointer;">Logout</a>
            </div>
        </div>
    </div>
</div>
<div class="container">
    <h1>Market Trade Radar</h1>
    <div class="filter-section">
        <input type="date" id="date-filter" onchange="fetchData()">
        <select id="cat-filter" onchange="render()"><option value="all">All Categories</option><option value="Forex">Forex</option><option value="Commodities">Commodities</option></select>
        <select id="ticker-filter" onchange="render()"><option value="all">All Tickers</option></select>
    </div>
    <table id="levels-table">
        <thead><tr><th>Date</th><th>Ticker</th><th onclick="toggleSortBias()">BIAS ↕</th><th>Bull/Bear Line</th><th>Market State</th><th>Volatility</th><th>Live Price</th></tr></thead>
        <tbody id="levels-body"><tr><td colspan="7">Loading radar data...</td></tr></tbody>
    </table>
</div>

<script>
    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');
    let cachedData = [];
    let livePrices = {};
    let biasSortOrder = 0;

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'index.html'; return; }
        const { data: profile } = await client.from('profiles').select('*').eq('id', session.user.id).single();
        if (profile?.is_admin) { document.getElementById('nav-admin').style.display = 'block'; document.getElementById('nav-upload').style.display = 'block'; }
        if (profile?.is_admin || profile?.subscription_tag === 'pro') { document.getElementById('nav-courses').style.display = 'block'; }
        
        document.getElementById('date-filter').value = new Date().toISOString().split('T')[0];
        await fetchData();
        startHybridFeedEngine();
    }

    async function fetchData() {
        const date = document.getElementById('date-filter').value;
        const { data } = await client.from('key_levels').select('*').eq('trade_date', date);
        cachedData = data || [];
        render();
    }

    async function startHybridFeedEngine() {
        // Use a timeout to stop "Loading..." from getting stuck
        const fetchWithTimeout = (url, options, timeout = 3000) => {
            return Promise.race([
                fetch(url, options),
                new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), timeout))
            ]);
        };

        const updateData = async () => {
            try {
                // Forex
                const res = await fetchWithTimeout('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await res.json();
                cachedData.forEach(r => {
                    const pair = r.ticker.split('/');
                    if(data.rates[pair[1]]) livePrices[r.ticker] = data.rates[pair[1]];
                });
                render();
            } catch (e) { console.error("Data update issue"); }
        };
        updateData();
        setInterval(updateData, 30000);
    }

    function render() {
        const tbody = document.getElementById('levels-body');
        tbody.innerHTML = cachedData.length > 0 ? cachedData.map(r => {
            const price = livePrices[r.ticker];
            const range = Math.abs(r.r1 - r.s1).toFixed(4);
            const isUp = price > r.bull_bear_line;
            return `
            <tr>
                <td>${r.trade_date}</td><td>${r.ticker}</td>
                <td class="${price ? (isUp ? 'bias-up' : 'bias-down') : ''}">${price ? (isUp ? '↑ Bullish' : '↓ Bearish') : 'N/A'}</td>
                <td>${r.bull_bear_line}</td>
                <td><span class="state-badge ${range > 0.005 ? 'trending' : 'consolidated'}">${range > 0.005 ? 'Trending' : 'Consolidated'}</span></td>
                <td><span class="range-badge">${range}</span></td>
                <td class="live-price-cell">${price ? price.toFixed(4) : 'N/A'}</td>
            </tr>`;
        }).join('') : '<tr><td colspan="7">No data.</td></tr>';
    }

    function toggleDropdown() { document.getElementById("settingsDropdown").style.display = document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block"; }
    document.getElementById('logoutBtn').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'index.html'; });
    init();
</script>
</body>
</html>
