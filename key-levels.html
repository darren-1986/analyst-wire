<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyst Wire | Trade Radar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000000; color: #d1d4dc; margin: 0; min-height: 100vh; }
        
        /* Navigation (Preserved) */
        .top-nav { background: #131722; padding: 0 20px; height: 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2e39; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #787b86; text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .nav-links a.active { color: #2962ff; font-weight: bold; }

        /* Dropdown Styling */
        .dropdown { position: relative; margin-left: 20px; }
        .dropbtn { background: none; border: none; color: #787b86; cursor: pointer; font-size: 18px; padding: 5px; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1c2230; min-width: 150px; border: 1px solid #2a2e39; z-index: 1000; border-radius: 4px; }
        .dropdown-content a { color: #d1d4dc; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; cursor: pointer; }
        .dropdown-content a:hover { background-color: #2a2e39; }

        /* Radar Styling */
        .container { padding: 30px; }
        table { width: 100%; border-collapse: collapse; background: #131722; margin-top: 20px; border: 1px solid #2a2e39; }
        th { background: #1c2230; padding: 12px; text-align: left; border: 1px solid #2a2e39; color: #787b86; font-size: 11px; text-transform: uppercase; }
        td { padding: 12px; border: 1px solid #2a2e39; color: #fff; font-size: 14px; }
        
        /* Tool Indicators */
        .bias-up { color: #089981; font-weight: bold; }
        .bias-down { color: #f23645; font-weight: bold; }
        .range-badge { background: #2a2e39; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 12px; }
        .state-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
        .trending { background: #2962ff; color: white; }
        .consolidated { background: #5d606b; color: white; }
    </style>
</head>
<body>

<div class="top-nav">
    <div style="height: 50px; display: flex; align-items: center;">
        <img src="assets/logo.png" alt="Analyst Wire" style="height: 40px;">
    </div>
    <div class="nav-links">
        <a href="terminal.html">Dashboard</a>
        <a href="/newsfeed">Newsfeed</a>
        <a id="nav-courses" href="courses.html" style="display: none;">Courses</a>
        <a href="key-levels.html" class="active">Key Levels</a>
        
        <div class="dropdown">
            <button class="dropbtn" onclick="toggleDropdown()">⚙️</button>
            <div id="settingsDropdown" class="dropdown-content">
                <a href="account.html">Account</a>
                <a id="nav-admin" style="display: none;" href="admin.html">Admin</a>
                <a id="nav-upload" style="display: none;" href="admin_upload.html">Upload Data</a>
                <a id="logoutBtn" style="color: #f23645; cursor: pointer;">Logout</a>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <h1>Market Trade Radar</h1>
    <table id="levels-table">
        <thead>
            <tr>
                <th>Date</th><th>Ticker</th><th>Bias</th><th>Bull/Bear Line</th><th>Market State</th><th>Volatility (R1-S1)</th><th>S1</th><th>R1</th>
            </tr>
        </thead>
        <tbody id="levels-body">
            <tr><td colspan="8">Loading radar data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'YOUR_SUPABASE_KEY');

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'index.html'; return; }

        const { data: profile } = await client.from('profiles').select('*').eq('id', session.user.id).single();
        
        // --- HARD BOUNCER ---
        const allowedTags = ['pro', 'admin', 'newsfeed', 'squawk'];
        if (!profile || (profile.is_admin !== true && !allowedTags.includes(profile.subscription_tag))) {
            alert("This page is for Pro subscribers only.");
            window.location.href = 'terminal.html';
            return;
        }

        // Show Admin/Upload/Courses Links
        if (profile.is_admin === true) {
            document.getElementById('nav-admin').style.display = 'block';
            document.getElementById('nav-upload').style.display = 'block';
        }
        if (profile.is_admin === true || profile.subscription_tag === 'pro') {
            document.getElementById('nav-courses').style.display = 'block';
        }

        // Fetch Data
        const { data, error } = await client.from('key_levels').select('*').order('trade_date', {ascending: false});
        if (error) { document.getElementById('levels-body').innerHTML = "<tr><td colspan='8'>Error loading data.</td></tr>"; return; }
        
        const tbody = document.getElementById('levels-body');
        tbody.innerHTML = data.map(r => {
            // TOOL: Volatility Range
            const range = Math.abs(r.r1 - r.s1).toFixed(4);
            
            // TOOL: Market State Indicator
            const isTrending = range > 0.0050; // Threshold 50 pips
            const state = isTrending ? "Trending" : "Consolidated";
            const stateClass = isTrending ? "trending" : "consolidated";

            // TOOL: Dynamic Bias Coloring
            const biasText = r.bias || 'Neutral';
            const biasClass = (biasText.includes('↓') || biasText.toLowerCase().includes('bear')) ? 'bias-down' : (biasText.includes('↑') || biasText.toLowerCase().includes('bull') ? 'bias-up' : '');
            
            return `
                <tr>
                    <td>${r.trade_date}</td>
                    <td><b>${r.ticker}</b></td>
                    <td class="${biasClass}">${biasText}</td>
                    <td>${r.bull_bear_line}</td>
                    <td><span class="state-badge ${stateClass}">${state}</span></td>
                    <td><span class="range-badge">${range}</span></td>
                    <td>${r.s1}</td>
                    <td>${r.r1}</td>
                </tr>
            `;
        }).join('');
    }

    function toggleDropdown() { document.getElementById("settingsDropdown").style.display = document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block"; }
    document.getElementById('logoutBtn').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'index.html'; });
    
    init();
</script>
</body>
</html>
