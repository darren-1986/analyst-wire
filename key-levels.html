<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="media/favicon.png">
<title>Analyst Wire | Key Levels</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
/* Modern typography and base styling */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #090b10; color: #d1d4dc; margin: 0; min-height: 100vh; font-size: 13px; }

/* Dashboard Grid Layout */
.dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 20px; padding: 20px; height: calc(100vh - 75px); box-sizing: border-box; }
.grid-quadrant { background: #0d1117; border: 1px solid #30363d; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
.quadrant-header { padding: 12px 16px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }

/* Navigation */
.top-nav { background: #0d1117; padding: 0 20px; height: 55px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1c2230; }
.nav-links { display: flex; align-items: center; gap: 5px; }
.nav-links a { color: #8b949e; text-decoration: none; margin-left: 15px; font-size: 13px; font-weight: 500; cursor: pointer; transition: color 0.2s; padding: 6px 12px; border-radius: 6px; }
.nav-links a:hover { color: #fff; background: rgba(255,255,255,0.05); }
.nav-links a.active { color: #2962ff; font-weight: 600; background: rgba(41, 98, 255, 0.1); }

/* Dropdown Styling */
.dropdown { position: relative; margin-left: 10px; }
.dropbtn { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 18px; padding: 5px; transition: color 0.2s; }
.dropbtn:hover { color: #fff; }
.dropdown-content { display: none; position: absolute; right: 0; top: 35px; background-color: #161b22; min-width: 160px; border: 1px solid #30363d; z-index: 1000; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); overflow: hidden; }
.dropdown-content a { color: #c9d1d9; padding: 10px 16px; text-decoration: none; display: block; font-size: 13px; cursor: pointer; transition: background 0.15s; margin: 0; border-radius: 0; }
.dropdown-content a:hover { background-color: #21262d; color: #fff; }

/* Modal Styles */
.modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
.modal-content { background-color: #0d1117; margin: 5% auto; padding: 35px; border: 1px solid #30363d; width: 80%; max-width: 750px; color: #c9d1d9; border-radius: 12px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
.close-btn { color: #8b949e; float: right; font-size: 24px; font-weight: normal; cursor: pointer; transition: color 0.2s; line-height: 1; }
.close-btn:hover { color: #fff; }
.modal-content h2 { margin-top: 0; font-weight: 600; color: #fff; }
.modal-content h3 { font-weight: 600; color: #fff; margin-top: 25px; }
.modal-content hr { border: 0; border-top: 1px solid #30363d; margin: 25px 0; }

/* Header & Filter Section */
.header-row { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
h1 { margin: 0; font-size: 22px; font-weight: 600; color: #fff; letter-spacing: -0.5px; }
.info-btn { background: rgba(41, 98, 255, 0.1); color: #2962ff; border: 1px solid rgba(41, 98, 255, 0.3); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
.info-btn:hover { background: #2962ff; color: #fff; }
.filter-section { display: flex; gap: 12px; padding: 15px; align-items: center; border-bottom: 1px solid #30363d; }
select, input[type="date"] { background: #0d1117; color: #c9d1d9; padding: 8px 12px; border: 1px solid #30363d; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; cursor: pointer; }

/* Table Container */
.table-container { overflow-y: auto; flex: 1; }
table { width: 100%; border-collapse: collapse; text-align: left; }
th { background: #161b22; padding: 12px 20px; color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; border-bottom: 1px solid #30363d; cursor: pointer; }
td { padding: 12px 20px; border-bottom: 1px solid #1c2230; color: #c9d1d9; }
tbody tr:hover { background-color: rgba(255,255,255,0.03); }

/* Color Settings */
.bias-strong-up { color: #2ea043; font-weight: 600; }
.bias-medium-up { color: #a6e22e; font-weight: 500; }
.bias-neutral { color: #d29922; font-weight: 600; }
.bias-medium-down { color: #f0883e; font-weight: 500; }
.bias-strong-down { color: #f85149; font-weight: 600; }
.range-badge { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #8b949e; }
.state-badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; display: inline-block; }
.trending { background: rgba(41, 98, 255, 0.1); color: #58a6ff; border: 1px solid rgba(41, 98, 255, 0.2); }
.consolidated { background: rgba(139, 148, 158, 0.1); color: #8b949e; border: 1px solid rgba(139, 148, 158, 0.2); }

/* Drawer & Lollipop */
.expand-toggle-btn { background: transparent; border: 1px solid #30363d; color: #8b949e; cursor: pointer; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
.drawer-row { display: none; background: #05070a !important; border-bottom: 1px solid #1c2230; }
.drawer-container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 25px; padding: 25px; border-left: 3px solid #2962ff; }
.lollipop-badge { padding: 4px 10px; border-radius: 6px; font-weight: 600; font-size: 11px; text-transform: uppercase; display: inline-block; }
.embedded-chart-frame { height: 250px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
</style>
</head>
<body>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2>How to Use the Market Trade Radar</h2>
        <p style="color: #8b949e; margin-top: -10px; font-size: 14px;">A professional-grade terminal guide to decoding intraday market structures.</p>
    </div>
</div>

<div class="top-nav">
    <img src="assets/logo.png" style="height: 35px;">
    <div class="nav-links">
        <a href="terminal.html">Dashboard</a>
        <a href="key-levels.html" class="active">Key Levels</a>
        <button class="dropbtn" onclick="toggleDropdown()">⚙️</button>
        <div id="settingsDropdown" class="dropdown-content">
            <a id="nav-admin" style="display: none;" href="admin.html">Admin</a>
            <a id="nav-upload" style="display: none;" href="admin_upload.html">Upload Data</a>
            <a id="logoutBtn" style="color: #f85149; cursor: pointer;">Logout</a>
        </div>
    </div>
</div>

<div class="dashboard-grid">
    <div class="grid-quadrant">
        <div class="quadrant-header">
            <h1 style="font-size: 15px;">Market Trade Radar</h1>
            <button class="info-btn" onclick="openModal()">Info ℹ</button>
        </div>
        <div class="table-container">
            <div class="filter-section">
                <input type="date" id="date-filter" onchange="fetchData()">
                <select id="cat-filter" onchange="render()"><option value="all">All Categories</option></select>
                <select id="ticker-filter" onchange="render()"><option value="all">All Tickers</option></select>
            </div>
            <table id="levels-table">
                <thead>
                    <tr>
                        <th>Date</th><th>Ticker</th><th onclick="toggleSortBias()">BIAS ↕</th><th>Bull/Bear Line</th>
                        <th onclick="toggleSortState()">Market State ↕</th><th>Volatility</th><th>Action</th>
                    </tr>
                </thead>
                <tbody id="levels-body"></tbody>
            </table>
        </div>
    </div>
    <div class="grid-quadrant"><div class="quadrant-header"><h1 style="font-size: 14px;">Indicator Q2</h1></div></div>
    <div class="grid-quadrant"><div class="quadrant-header"><h1 style="font-size: 14px;">Indicator Q3</h1></div></div>
    <div class="grid-quadrant"><div class="quadrant-header"><h1 style="font-size: 14px;">Indicator Q4</h1></div></div>
</div>

<script>
const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

const categoryMap = {
'EUR/USD': 'Forex', 'GBP/USD': 'Forex', 'AUD/USD': 'Forex', 'NZD/USD': 'Forex', 'AUD/NZD': 'Forex', 'EUR/CHF': 'Forex',
'USD/CHF': 'Forex', 'USD/CAD': 'Forex', 'USD/NOK': 'Forex', 'USD/MXN': 'Forex', 'USD/JPY': 'Forex', 'EUR/JPY': 'Forex',
'GBP/JPY': 'Forex', 'AUD/JPY': 'Forex', 'NZD/JPY': 'Forex', 'CAD/JPY': 'Forex', 'EUR/GBP': 'Forex', 'EUR/AUD': 'Forex',
'EUR/NZD': 'Forex', 'GBP/AUD': 'Forex', 'GBP/NZD': 'Forex', 'DXY': 'Forex',
'XAU/USD': 'Commodities', 'XAG/USD': 'Commodities', 'WTI': 'Commodities', 'COPPER': 'Commodities', 'COCOA': 'Commodities',
'COFFEE': 'Commodities', 'COTTONSUGAR': 'Commodities', 'CORN': 'Commodities', 'SOYBEANS': 'Commodities', 'WHEAT': 'Commodities',
'AAPL': 'Equities', 'AMZN': 'Equities', 'GOOG': 'Equities', 'MSFT': 'Equities', 'TSLA': 'Equities', 'META': 'Equities', 'V': 'Equities',
'JPM': 'Equities', 'KO': 'Equities', 'MCD': 'Equities', 'AMD': 'Equities', 'BABA': 'Equities', 'JNJ': 'Equities', 'NVDA': 'Equities',
'S&P500': 'Indices', 'NASDAQ': 'Indices', 'DOW': 'Indices', 'RUSSEL': 'Indices', 'FTSE': 'Indices', 'NIKKEI': 'Indices', 'HANG': 'Indices',
'BTC/USD': 'Crypto', 'ETH/USD': 'Crypto'
};

const tvSymbolMap = {
    'S&P500': 'SPY', 'NASDAQ': 'QQQ', 'DOW': 'DIA', 'WTI': 'USOIL', 'COPPER': 'HG1!',
    'COCOA': 'CC1!', 'COFFEE': 'KC1!', 'CORN': 'ZC1!', 'WHEAT': 'ZW1!', 'SOYBEANS': 'ZS1!', 'COTTONSUGAR': 'CT1!'
};

let cachedData = [];
let biasSortOrder = 0;
let stateSortOrder = 0;

function openModal() { document.getElementById("infoModal").style.display = "block"; }
function closeModal() { document.getElementById("infoModal").style.display = "none"; }
function toggleDropdown() { document.getElementById("settingsDropdown").style.display = document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block"; }

async function init() {
    const { data: { session } } = await client.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return; }
    const { data: profile } = await client.from('profiles').select('*').eq('id', session.user.id).single();
    if (profile?.is_admin) {
        document.getElementById('nav-admin').style.display = 'block';
        document.getElementById('nav-upload').style.display = 'block';
    }
    document.getElementById('date-filter').value = new Date().toISOString().split('T')[0];
    fetchData();
}

async function fetchData() {
    const date = document.getElementById('date-filter').value;
    const { data, error } = await client.from('key_levels').select('*').eq('trade_date', date);
    if (error) { console.error(error); return; }
    cachedData = data || [];
    const tickerSelect = document.getElementById('ticker-filter');
    tickerSelect.innerHTML = '<option value="all">All Tickers</option>';
    [...new Set(cachedData.map(r => r.ticker))].sort().forEach(t => {
        tickerSelect.innerHTML += `<option value="${t}">${t}</option>`;
    });
    render();
}

function toggleDrawer(index, ticker) {
    const row = document.getElementById(`drawer-row-${index}`);
    const btn = document.getElementById(`expand-btn-${index}`);
    const container = document.getElementById(`chart-embed-${index}`);
    if (row.style.display === "table-row") {
        row.style.display = "none";
        btn.innerText = "Expand ▼";
    } else {
        row.style.display = "table-row";
        btn.innerText = "Close ▲";
        container.innerHTML = `<iframe style="width:100%;height:100%" src="https://s.tradingview.com/widgetembed/?symbol=${tvSymbolMap[ticker] || ticker.replace('/', '')}&theme=dark&style=1"></iframe>`;
    }
}

function toggleSortBias() { biasSortOrder = (biasSortOrder + 1) % 3; render(); }
function toggleSortState() { stateSortOrder = (stateSortOrder + 1) % 3; render(); }

function getAssetVolatilityMetrics(r) {
    const assetClass = categoryMap[r.ticker] || 'Forex';
    const rawDiff = Math.abs(parseFloat(r.r1) - parseFloat(r.s1));
    let rangeFormatted, isTrending;
    if (assetClass === 'Indices' || assetClass === 'Crypto') {
        rangeFormatted = rawDiff.toFixed(2); isTrending = rawDiff > 80.00;
    } else if (r.ticker === 'XAU/USD') {
        rangeFormatted = rawDiff.toFixed(2); isTrending = rawDiff > 15.00;
    } else {
        rangeFormatted = rawDiff.toFixed(4); isTrending = (rawDiff * 10000) > 75.0;
    }
    return { rangeFormatted, isTrending };
}

function render() {
    const tbody = document.getElementById('levels-body');
    const biasMap = { 'Strong Bullish': 2, 'Medium Bullish': 1, 'Neutral': 0, 'Medium Bearish': -1, 'Strong Bearish': -2 };
    let filtered = cachedData.filter(r => (document.getElementById('cat-filter').value === 'all' || categoryMap[r.ticker] === document.getElementById('cat-filter').value) && (document.getElementById('ticker-filter').value === 'all' || r.ticker === document.getElementById('ticker-filter').value));

    if (biasSortOrder !== 0) filtered.sort((a, b) => (biasMap[a.bias] - biasMap[b.bias]) * (biasSortOrder === 1 ? 1 : -1));

    tbody.innerHTML = filtered.map((r, index) => {
        const metrics = getAssetVolatilityMetrics(r);
        return `
            <tr>
                <td>${r.trade_date}</td><td>${r.ticker}</td><td>${r.bias}</td><td>${r.bull_bear_line}</td>
                <td><span class="state-badge ${metrics.isTrending ? 'trending' : 'consolidated'}">${metrics.isTrending ? "Trending" : "Consolidated"}</span></td>
                <td><span class="range-badge">${metrics.rangeFormatted}</span></td>
                <td><button class="expand-toggle-btn" id="expand-btn-${index}" onclick="toggleDrawer(${index}, '${r.ticker}')">Expand ▼</button></td>
            </tr>
            <tr id="drawer-row-${index}" class="drawer-row">
                <td colspan="7">
                    <div class="drawer-container">
                        <div class="analysis-panel">
                            <span class="drawer-section-title">Lollipop Momentum</span>
                            <div class="lollipop-badge">${r.lollipop}</div>
                            <p style="font-size: 13px;">${r.analysis}</p>
                        </div>
                        <div id="chart-embed-${index}" class="embedded-chart-frame"></div>
                    </div>
                </td>
            </tr>
        `;
    }).join('');
}
document.getElementById('logoutBtn').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'index.html'; });
init();
</script>
</body>
</html>
