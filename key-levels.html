<!DOCTYPE html>
<html lang="en">
<head>
    <title>Analyst Wire | Radar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .radar-card { background: #131722; border-radius: 8px; padding: 20px; border: 1px solid #2a2e39; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { color: #787b86; font-size: 11px; text-transform: uppercase; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #2a2e39; font-size: 14px; }
        .bias-up { color: #089981; } .bias-down { color: #f23645; }
        .state-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .trending { background: #2962ff; } .consolidated { background: #5d606b; }
    </style>
</head>
<body>

<div class="radar-card">
    <h1>Market Trade Radar</h1>
    <table id="radar-table">
        <thead>
            <tr><th>Ticker</th><th>Bias</th><th>Bull/Bear Line</th><th>Market State</th><th>Range (R1-S1)</th></tr>
        </thead>
        <tbody id="radar-body"></tbody>
    </table>
</div>

<script>
    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'YOUR_SUPABASE_KEY');

    async function init() {
        const { data } = await client.from('key_levels').select('*').order('trade_date', {ascending: false});
        const tbody = document.getElementById('radar-body');
        
        tbody.innerHTML = data.map(r => {
            const range = (r.r1 - r.s1).toFixed(4);
            const state = range > 0.0050 ? "Trending" : "Consolidated";
            const stateClass = range > 0.0050 ? "trending" : "consolidated";
            const biasClass = r.bias.includes('↓') ? 'bias-down' : 'bias-up';
            
            return `
                <tr>
                    <td><b>${r.ticker}</b></td>
                    <td class="${biasClass}">${r.bias}</td>
                    <td>${r.bull_bear_line}</td>
                    <td><span class="state-badge ${stateClass}">${state}</span></td>
                    <td>${range}</td>
                </tr>
            `;
        }).join('');
    }
    init();
</script>
</body>
</html>
