<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyst Wire Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        async function checkAccess() {
            const { data: { user } } = await supabase.auth.getUser();
            
            // 1. If not logged in, boot them to login page
            if (!user) {
                window.location.href = '/index.html';
                return;
            }

            // 2. Fetch their status from the profiles table
            const { data: profile } = await supabase
                .from('profiles')
                .select('subscription_tag')
                .eq('id', user.id)
                .single();

            // 3. If not 'pro', boot them to a checkout page
            if (!profile || profile.subscription_tag !== 'pro') {
                alert('Terminal access requires a Pro subscription.');
                window.location.href = '/upgrade.html'; // Or your Stripe checkout page
            }
        }

        // Run this check immediately when the page starts
        checkAccess();
    </script>
</head>
<body>
    <h1>Welcome to the Analyst Wire Terminal</h1>
    </body>
</html>
