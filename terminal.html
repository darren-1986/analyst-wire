    <style>
        /* Force hide TradingView branding by cropping the container */
        .ticker-wrapper { height: 40px; overflow: hidden; position: relative; width: 100%; }

        /* Refinitiv-inspired Dark Theme */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000000; color: #d1d4dc; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        *, *:before, *:after { box-sizing: border-box; }
        
        /* Top Navigation */
        .top-nav { background: #131722; padding: 0 20px; height: 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2e39; position: relative; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #787b86; text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
        .nav-links a:hover { color: #d1d4dc; }
        .nav-links a.active { color: #2962ff; font-weight: bold; }

        /* Dropdown Styling */
        .dropdown { position: relative; margin-left: 20px; }
        .dropbtn { background: none; border: none; color: #787b86; cursor: pointer; font-size: 18px; padding: 5px; }
        .dropbtn:hover { color: #fff; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1c2230; min-width: 150px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); border: 1px solid #2a2e39; z-index: 1000; border-radius: 4px; }
        .dropdown-content a { color: #d1d4dc; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; margin: 0; cursor: pointer; }
        .dropdown-content a:hover { background-color: #2a2e39; }

        /* View Containers */
        #terminal-view { display: grid; grid-template-columns: 5fr 2fr; grid-template-rows: auto 1fr; gap: 15px; padding: 15px; flex-grow: 1; height: calc(100vh - 50px); }
        .ticker-panel { grid-column: 1 / -1; background: #131722; border: 1px solid #2a2e39; padding: 5px 10px; border-radius: 4px; display: flex; gap: 10px; font-family: monospace; font-size: 14px; }
        
        .panel { background: #131722; border: 1px solid #2a2e39; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
        .panel-header { background: #1c2230; padding: 10px 15px; font-size: 13px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #2a2e39; color: #787b86; }
        .panel-content { flex-grow: 1; overflow: hidden; position: relative; }

        /* Column wrappers */
        .left-column { display: flex; flex-direction: column; gap: 15px; min-height: 0; }
        .right-column { display: flex; flex-direction: column; gap: 15px; min-height: 0; }
    </style>
</head>
<body>

</div>

<div id="terminal-view">

       <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
       <div class="ticker-wrapper">

       </div>
    </div>

    <div class="left-column">
        <div class="panel" style="flex: 1;">

        <div class="panel" style="flex: 1;">

        <div class="panel" style="flex: 1;">

            <div class="panel-content" style="padding: 15px;">

    <div class="right-column">
        <div class="panel" style="flex: 1;">
    <div class="panel-header">Market Time Zones</div>
    <div class="panel-content">
        <div class="market-sessions-widget">
            <div class="msw-header">
                <span id="msw-user-time" class="msw-local-clock">00:00:00</span>
            </div>
            <div id="msw-sessions-container"></div>
        </div>

        <style>
            .market-sessions-widget { box-sizing: border-box; width: 100%; background-color: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: #f8fafc; font-family: sans-serif; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
            .msw-header { display: flex; justify-content: flex-end; margin-bottom: 12px; }
            .msw-local-clock { font-family: monospace; font-size: 11px; background: #1e293b; padding: 2px 6px; border-radius: 4px; color: #10b981; }
            .msw-session-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
            .msw-session-name { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; min-width: 90px; }
            .msw-icon-img { width: 16px; height: 16px; object-fit: contain; filter: brightness(0) saturate(100%) invert(80%) sepia(50%) saturate(1200%) hue-rotate(180deg); }
            .msw-status-dot { height: 6px; width: 6px; border-radius: 50%; background: #475569; flex-shrink: 0; }
            .msw-status-dot.open { background: #10b981; }
            .msw-session-status-text { font-size: 10px; font-weight: bold; font-family: monospace; min-width: 40px; text-align: center; }
            .msw-session-status-text.open { color: #10b981; }
            .msw-session-status-text.closed { color: #f97316; }
            .msw-zone-time { font-size: 9px; color: #64748b; font-family: monospace; display: block; }
            .msw-progress-bar-track { display: none; } /* Hidden for compactness */
            .msw-countdown-text { font-size: 10px; color: #94a3b8; font-family: monospace; text-align: right; white-space: nowrap; }
            
            /* Responsive adjust */
            @media (max-width: 350px) {
                .market-sessions-widget { padding: 10px; }
                .msw-session-name { font-size: 11px; }
            }
        </style>

        <script>
        (function() {
            const SESSIONS = [
                { name: 'Sydney', zone: 'Australia/Sydney', open: 10, close: 16, img: 'media/sydney.png' },
                { name: 'Tokyo', zone: 'Asia/Tokyo', open: 9, close: 15, img: 'media/tokyo.png' },
                { name: 'London', zone: 'Europe/London', open: 8, close: 16.5, img: 'media/london.png' },
                { name: 'New York', zone: 'America/New_York', open: 9.5, close: 16, img: 'media/new-york.png' }
            ];

            const container = document.getElementById('msw-sessions-container');
            container.innerHTML = '';
            
            SESSIONS.forEach(s => {
                const row = document.createElement('div');
                row.className = 'msw-session-row';
                row.innerHTML = `
                    <div class="msw-session-name">
                        <span class="msw-status-dot"></span>
                        <img src="${s.img}" class="msw-icon-img" alt="${s.name}">
                        <span>${s.name}<small class="msw-zone-time" id="time-${s.name.replace(/\s+/g, '-')}"></small></span>
                    </div>
                    <span class="msw-session-status-text"></span>
                    <div class="msw-countdown-text"></div>
                `;
                container.appendChild(row);
                s.row = row;
                s.timeEl = row.querySelector(`#time-${s.name.replace(/\s+/g, '-')}`);
            });

            function update() {
                const now = new Date();
                const clock = document.getElementById('msw-user-time');
                if(clock) clock.innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                
                SESSIONS.forEach(s => {
                    const dateInZone = new Date(now.toLocaleString('en-US', { timeZone: s.zone }));
                    if(s.timeEl) s.timeEl.innerText = dateInZone.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    const hours = dateInZone.getHours() + (dateInZone.getMinutes() / 60);
                    const day = dateInZone.getDay();
                    const isOpen = (day > 0 && day < 6) && (hours >= s.open && hours < s.close);
                    
                    s.row.querySelector('.msw-status-dot').className = `msw-status-dot ${isOpen ? 'open' : ''}`;
                    const txt = s.row.querySelector('.msw-session-status-text');
                    txt.innerText = isOpen ? 'OPEN' : 'CLOSED';
                    txt.className = `msw-session-status-text ${isOpen ? 'open' : 'closed'}`;
                    
                    const countEl = s.row.querySelector('.msw-countdown-text');
                    if (isOpen) {
                        const rem = (s.close - hours) * 3600;
                        countEl.innerText = `${Math.floor(rem/3600)}h ${Math.floor((rem%3600)/60)}m left`;
                    } else {
                        let target = new Date(dateInZone);
                        target.setHours(Math.floor(s.open), (s.open % 1) * 60, 0, 0);
                        if (dateInZone >= target) target.setDate(target.getDate() + 1);
                        while (target.getDay() === 0 || target.getDay() === 6) target.setDate(target.getDate() + 1);
                        const diff = target - dateInZone;
                        const d = Math.floor(diff / 86400000);
                        const h = Math.floor((diff % 86400000) / 3600000);
                        const m = Math.floor((diff % 3600000) / 60000);
                        countEl.innerText = `${(d > 0) ? d + 'd ' : ''}${h}h ${m}m`;
                    }
                });
            }
            update();
            setInterval(update, 1000);
        })();
        </script>
    </div>
</div>

<script>
    function toggleDropdown() { document.getElementById("settingsDropdown").style.display = document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block"; }
    
    const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'index.html'; return; }

        const { data: profile } = await client.from('profiles').select('is_admin, subscription_tag').eq('id', session.user.id).single();

        if (!profile || profile.subscription_tag === 'free') {
            alert("Your subscription is inactive. Redirecting to login.");
            await client.auth.signOut();
            window.location.href = 'index.html';
            return;
        }

        if (profile) {
            if (profile.is_admin === true) {
                document.getElementById('nav-admin').style.display = 'block';
            }
            if (profile.is_admin === true || profile.subscription_tag === 'pro') {
                document.getElementById('nav-courses').style.display = 'block';
                document.getElementById('nav-key-levels').style.display = 'block';
            }
        }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'index.html'; });
    
    init();
</script>
