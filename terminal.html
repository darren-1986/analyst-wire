    <style>
        /* Force hide TradingView branding by cropping the container */
        .ticker-wrapper { height: 40px; overflow: hidden; position: relative; width: 100%; }

        /* Refinitiv-inspired Dark Theme */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000000; color: #d1d4dc; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        *, *:before, *:after { box-sizing: border-box; }
        
        /* Top Navigation */
        .top-nav { background: #131722; padding: 0 20px; height: 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2e39; position: relative; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #787b86; text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
        .nav-links a:hover { color: #d1d4dc; }
        .nav-links a.active { color: #2962ff; font-weight: bold; }

        /* Dropdown Styling */
        .dropdown { position: relative; margin-left: 20px; }
        .dropbtn { background: none; border: none; color: #787b86; cursor: pointer; font-size: 18px; padding: 5px; }
        .dropbtn:hover { color: #fff; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1c2230; min-width: 150px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); border: 1px solid #2a2e39; z-index: 1000; border-radius: 4px; }
        .dropdown-content a { color: #d1d4dc; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; margin: 0; cursor: pointer; }
        .dropdown-content a:hover { background-color: #2a2e39; }

        /* View Containers */
        #terminal-view { display: grid; grid-template-columns: 5fr 2fr; grid-template-rows: auto 1fr; gap: 15px; padding: 15px; flex-grow: 1; height: calc(100vh - 50px); }
        .ticker-panel { grid-column: 1 / -1; background: #131722; border: 1px solid #2a2e39; padding: 5px 10px; border-radius: 4px; display: flex; gap: 10px; font-family: monospace; font-size: 14px; }
        
        .panel { background: #131722; border: 1px solid #2a2e39; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
        .panel-header { background: #1c2230; padding: 10px 15px; font-size: 13px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #2a2e39; color: #787b86; }
        .panel-content { flex-grow: 1; overflow: hidden; position: relative; }

        /* Column wrappers */
        .left-column { display: flex; flex-direction: column; gap: 15px; min-height: 0; }
        .right-column { display: flex; flex-direction: column; gap: 15px; min-height: 0; }
    </style>
</head>

    <div class="panel-content">
        <div class="market-sessions-widget">
            <div class="msw-header">
                <div id="msw-hot-alert" class="msw-hot-alert" style="display:none;" title="HOT MARKET: Multiple sessions are open.">HOT MARKET</div>
                <span id="msw-user-time" class="msw-local-clock">00:00:00</span>
            </div>
            <div id="msw-sessions-container"></div>
        </div>

        <style>
            .market-sessions-widget { box-sizing: border-box; width: 100%; background-color: #0A0A0A; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: #f8fafc; font-family: sans-serif; }
            .msw-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
            .msw-hot-alert { font-size: 9px; font-weight: 800; color: #f43f5e; background: rgba(244, 63, 94, 0.15); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(244, 63, 94, 0.3); animation: pulse 1.5s infinite; cursor: help; }
            @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
            .msw-local-clock { font-family: monospace; font-size: 11px; background: #1e293b; padding: 2px 6px; border-radius: 4px; color: #10b981; }
            .msw-session-row { display: grid; grid-template-columns: 1fr 50px auto; align-items: center; gap: 8px; margin-bottom: 10px; }
            .msw-session-name { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; }
            .msw-icon-img { width: 16px; height: 16px; object-fit: contain; filter: brightness(0) saturate(100%) invert(80%) sepia(50%) saturate(1200%) hue-rotate(180deg); }
            .msw-status-dot { height: 6px; width: 6px; border-radius: 50%; background: #475569; }
            .msw-status-dot.open { background: #10b981; }
            .msw-session-status-text { font-size: 9px; font-weight: bold; font-family: monospace; text-align: left; }
            .msw-session-status-text.open { color: #10b981; }
            .msw-session-status-text.closed { color: #f97316; }
            .msw-zone-time { font-size: 9px; color: #64748b; font-family: monospace; display: block; margin-top: 1px; }
            .msw-countdown-text { font-size: 9px; color: #94a3b8; font-family: monospace; text-align: right; min-width: 60px; }
        </style>

        <script>
        (function() {
            const SESSIONS = [
                { name: 'Sydney', zone: 'Australia/Sydney', open: 8, close: 16 },
                { name: 'Tokyo', zone: 'Asia/Tokyo', open: 8, close: 16 },
                { name: 'London', zone: 'Europe/London', open: 8, close: 16 },
                { name: 'New York', zone: 'America/New_York', open: 8, close: 16 }
            ];

            function tick() {
                const now = new Date();
                document.getElementById('msw-user-time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                
                let openCount = 0;
                
                SESSIONS.forEach(s => {
                    const formatter = new Intl.DateTimeFormat('en-US', {
                        timeZone: s.zone, hour: '2-digit', minute: '2-digit', hour12: false
                    });
                    const parts = formatter.formatToParts(now);
                    const h = parseInt(parts.find(p => p.type === 'hour').value);
                    const m = parseInt(parts.find(p => p.type === 'minute').value);
                    const timeDecimal = h + (m / 60);

                    document.getElementById('time-'+s.name).innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                    
                    const isOpen = (timeDecimal >= s.open && timeDecimal < s.close);
                    if(isOpen) openCount++;
                    
                    document.getElementById('dot-'+s.name).className = `msw-status-dot ${isOpen ? 'open' : ''}`;
                    document.getElementById('stat-'+s.name).innerText = isOpen ? 'OPEN' : 'CLOSED';
                    document.getElementById('stat-'+s.name).className = `msw-session-status-text ${isOpen ? 'open' : 'closed'}`;
                    
                    let output = "";
                    if (isOpen) {
                        let minsLeft = (s.close - timeDecimal) * 60;
                        output = `${Math.floor(minsLeft/60)}h ${Math.round(minsLeft%60)}m left`;
                    } else {
                        let hoursUntil = (s.open - timeDecimal);
                        if (hoursUntil < 0) hoursUntil += 24;
                        output = `${Math.floor(hoursUntil)}h ${Math.round((hoursUntil%1)*60)}m`;
                    }
                    document.getElementById('count-'+s.name).innerText = output;
                });

                // Hot alert logic
                document.getElementById('msw-hot-alert').style.display = (openCount > 1) ? 'block' : 'none';
            }

            const container = document.getElementById('msw-sessions-container');
            container.innerHTML = '';
            SESSIONS.forEach(s => {
                container.insertAdjacentHTML('beforeend', `<div class="msw-session-row"><div class="msw-session-name"><span class="msw-status-dot" id="dot-${s.name}"></span><span>${s.name}<small class="msw-zone-time" id="time-${s.name}"></small></span></div><span class="msw-session-status-text" id="stat-${s.name}"></span><div class="msw-countdown-text" id="count-${s.name}"></div></div>`);
            });
            setInterval(tick, 1000);
            tick();
        })();
        </script>
    </div>
</div>

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'index.html'; return; }

        const { data: profile } = await client.from('profiles').select('is_admin, subscription_tag').eq('id', session.user.id).single();

        if (!profile || profile.subscription_tag === 'free') {
            alert("Your subscription is inactive. Redirecting to login.");
            await client.auth.signOut();
            window.location.href = 'index.html';
            return;
        }

        if (profile) {
            if (profile.is_admin === true) {
                document.getElementById('nav-admin').style.display = 'block';
            }
            if (profile.is_admin === true || profile.subscription_tag === 'pro') {
                document.getElementById('nav-courses').style.display = 'block';
                document.getElementById('nav-key-levels').style.display = 'block';
            }
        }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'index.html'; });
    
    init();
</script>
