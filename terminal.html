<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyst Wire | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        /* Refinitiv-inspired Dark Theme */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000000; color: #d1d4dc; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Top Navigation */
        .top-nav { background: #131722; padding: 0 20px; height: 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2e39; position: relative; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #787b86; text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
        .nav-links a:hover { color: #d1d4dc; }
        .nav-links a.active { color: #2962ff; font-weight: bold; }

        /* Dropdown Styling */
        .dropdown { position: relative; margin-left: 20px; }
        .dropbtn { background: none; border: none; color: #787b86; cursor: pointer; font-size: 18px; padding: 5px; }
        .dropbtn:hover { color: #fff; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1c2230; min-width: 150px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); border: 1px solid #2a2e39; z-index: 1000; border-radius: 4px; }
        .dropdown-content a { color: #d1d4dc; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; margin: 0; cursor: pointer; }
        .dropdown-content a:hover { background-color: #2a2e39; }

        /* --- VIEW CONTAINERS --- */
        #terminal-view { 
            display: grid; 
            grid-template-columns: 3fr 1fr; 
            grid-template-rows: auto 1fr; 
            gap: 15px; 
            padding: 15px; 
            flex-grow: 1; 
            box-sizing: border-box; 
            height: calc(100vh - 50px);
        }

        /* --- TERMINAL UI ELEMENTS --- */
        .ticker-panel { grid-column: 1 / -1; background: #131722; border: 1px solid #2a2e39; padding: 10px 15px; border-radius: 4px; display: flex; gap: 30px; font-family: monospace; font-size: 14px; }
        .tick-up { color: #089981; } .tick-down { color: #f23645; }
        .panel { background: #131722; border: 1px solid #2a2e39; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { background: #1c2230; padding: 10px 15px; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a2e39; color: #787b86; }
        .panel-content { padding: 15px; flex-grow: 1; overflow-y: auto; }

        .news-item { padding: 10px 0; border-bottom: 1px solid #2a2e39; font-size: 13px; }
        .news-item:last-child { border-bottom: none; }
        .news-tag { background: #2962ff; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; margin-right: 8px; }
    </style>
</head>
<body>

<div class="top-nav">
   <div style="height: 50px; display: flex; align-items: center; justify-content: center; box-sizing: border-box; padding: 5px 0;">
       <img src="assets/logo.png" alt="Analyst Wire" style="height: 40px; width: auto; object-fit: contain; display: block;">
   </div>
   <div class="nav-links">
       <a href="terminal.html" class="active">Dashboard</a>
       <a href="courses.html">Courses</a>
       
       <div class="dropdown">
           <button class="dropbtn" onclick="toggleDropdown()">⚙️</button>
           <div id="settingsDropdown" class="dropdown-content">
               <a href="account.html">Account</a>
               <a id="nav-admin" style="display: none;" href="admin.html">Admin</a>
               <a id="logoutBtn" style="color: #f23645; cursor: pointer;">Logout</a>
           </div>
       </div>
   </div>
</div>

<div id="terminal-view">
    <div class="ticker-panel">
        <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
        <tv-ticker-tape symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,BITSTAMP:BTCUSD,BITSTAMP:ETHUSD,CMCMARKETS:GOLD,OANDA:EURUSD,OANDA:GBPUSD,OANDA:USDJPY,OANDA:AUDUSD,OANDA:GBPJPY,OANDA:USDCAD,OANDA:NZDUSD,OANDA:EURJPY,CME_MINI:MNQ1!,CME_MINI:NQ1!,CME_MINI:ES1!,TVC:SILVER" line-chart-type="Baseline" item-size="compact" show-hover></tv-ticker-tape>
    </div>

    <div class="panel">
        <div class="panel-header">Newsfeed</div>
        <div class="panel-content" id="macro-engine-container">
            <div class="newsfeed-container" style="display: flex; flex-direction: column; height: 100%;">
                <iframe src="https://analyst-wire.pages.dev/newsfeed" style="flex-grow: 1; border: none;"></iframe>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">Live Feed (Gold, AUS, USA)</div>
        <div class="panel-content" id="newsfeed-container">
            <div class="news-item"><span class="news-tag">XAU</span> Central banks increase gold reserves amid geopolitical tensions.</div>
            <div class="news-item"><span class="news-tag">USD</span> Fed officials signal potential for sustained higher rates through Q3.</div>
            <div class="news-item"><span class="news-tag">AUD</span> RBA maintains hawkish bias following stronger-than-expected inflation data.</div>
        </div>
    </div>
</div>

<script>
    // --- DROPDOWN LOGIC ---
    function toggleDropdown() {
        document.getElementById("settingsDropdown").style.display = 
            document.getElementById("settingsDropdown").style.display === "block" ? "none" : "block";
    }
    window.onclick = function(event) {
        if (!event.target.matches('.dropbtn')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                dropdowns[i].style.display = "none";
            }
        }
    }

    window.addEventListener('message', (event) => {
        if (event.data.height) {
            document.querySelector('iframe').style.height = event.data.height + 'px';
        }
    });
    
    const SUPABASE_URL = 'https://fgidelsazisdqjfckerd.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Initial Auth Check
    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'index.html'; return; }
        
        const { data: profile } = await client.from('profiles').select('is_admin').eq('id', session.user.id).single();
        if (profile && profile.is_admin === true) {
            document.getElementById('nav-admin').style.display = 'block';
        }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => { 
        await client.auth.signOut(); 
        window.location.href = 'index.html'; 
    });

    init();
</script>

</body>
</html>
