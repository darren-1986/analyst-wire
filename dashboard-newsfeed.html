<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>LiveSquawk Premium Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    
    <style>
        /* Base styles */
        body, .messenger__outer { transition: background 0.3s, color 0.3s; background-color: #0f172a !important; color: #ffffff !important; }
        
        /* Layout controls */
        .custom-newsfeed-header { display: flex; align-items: center; padding: 15px; font-family: 'Inter', system-ui, sans-serif; font-weight: 700; text-transform: uppercase; font-size: 16px; }
        .green-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; margin-right: 12px; }
        .controls { display: flex; justify-content: center; margin-bottom: 10px; gap: 20px; align-items: center; padding: 10px; }
        
        /* Headline Limiter: Hide everything after the 3rd item */
        .messenger__outer .news__item__outer { display: none !important; }
        .messenger__outer .news__item__outer:nth-child(-n+3) { display: block !important; padding: 10px; border-bottom: 1px solid #334155; }

        /* General styles preserved from your original */
        #filterDropdown { padding: 5px 10px; cursor: pointer; border-radius: 4px; border: 1px solid #475569; background: #1e293b; color: white; font-size: 14px; }
        .audio-wrapper { display: flex; align-items: center; gap: 15px; border: 1px solid #00b4f9; padding: 6px 14px; border-radius: 8px; background: #0f172a; }
        #audioToggle { cursor: pointer; background: none; border: none; color: #f8fafc; font-weight: 500; display: flex; align-items: center; gap: 8px; min-width: 190px; }
        .status-on { color: #22c55e !important; }
    </style>
</head>
<body class="dark">

    <div class="controls">
        <div class="audio-container">
            <div class="audio-wrapper">
                <button id="audioToggle" onclick="handleAudioToggle()">🔊 <span id="audioLabel">Disconnected</span> <span id="timerText"></span></button>
                <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.1" value="1" title="Volume">
            </div>
        </div>
        
        <select id="filterDropdown" onchange="setFilter(this.value)">
            <option value="all">All</option>
            <option value="commodities">Commodities</option>
            <option value="forex">Forex</option>
            <option value="equities">Equities</option>
            <option value="crypto">Crypto</option>
            <option value="centralBanks">Central Banks</option>
        </select>
    </div>

    <div class="custom-newsfeed-header"><div class="green-dot"></div> NEWSFEED</div>
    <div class="messenger__outer" id="livesquawk_messenger_outer"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // --- AUTH & PERMISSION CHECK ---
        const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

        async function checkPermissions() {
            const { data: { session } } = await client.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            const { data: profile } = await client.from('profiles').select('is_admin, subscription_tag').eq('id', session.user.id).single();
            const allowedTags = ['pro', 'newsfeed', 'squawk', 'admin'];
            const isAuthorized = profile && (profile.is_admin === true || allowedTags.includes(profile.subscription_tag));
            if (!isAuthorized) { alert("Access denied."); await client.auth.signOut(); window.location.href = 'index.html'; }
        }
        checkPermissions();

        // --- AUDIO & LOGIC ---
        let audioEnabled = false, seconds = 0, timerInterval;
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
                document.getElementById('timerText').innerText = `(${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')})`;
            }, 1000);
        }

        async function handleAudioToggle() {
            const btn = document.getElementById('audioToggle'), lbl = document.getElementById('audioLabel');
            audioEnabled = !audioEnabled;
            if (audioEnabled) { startTimer(); lbl.innerText = "On Air"; lbl.classList.add('status-on'); }
            else { clearInterval(timerInterval); lbl.innerText = "Disconnected"; lbl.classList.remove('status-on'); document.getElementById('timerText').innerText = ""; }
        }

        window.messenger_start_init = function() { if (typeof Messenger !== 'undefined') Messenger.init({ container: '#livesquawk_messenger_outer', product: 'forexanalytic' }); };
        
        Object.defineProperty(window, 'self', { get: () => window.top });
        window.addEventListener('load', () => { window.parent.postMessage({ height: document.body.scrollHeight }, '*'); });
    </script>
    
    <script src="https://www.livesquawk.com/partner_messenger/js/include_forexanalytic.js?v=3"></script>
</body>
</html>
