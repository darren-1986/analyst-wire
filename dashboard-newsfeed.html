<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LiveSquawk Premium Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #0f172a !important; color: white !important; }
        #livesquawk_messenger_outer { width: 100% !important; }
    </style>
</head>
<body>

    <div id="livesquawk_messenger_outer"></div>

    <script>
        // Use a MutationObserver to apply styles the moment items appear
        const observer = new MutationObserver(() => {
            // 1. Hide the yellow 'Latest' badge
            const latestBadges = document.querySelectorAll('.news__item__latest, .newsfeed__latest, .latest-badge');
            latestBadges.forEach(el => el.style.display = 'none');

            // 2. Hide all items, then show only the top 3
            const items = document.querySelectorAll('.news__item__outer');
            items.forEach((item, index) => {
                if (index < 3) {
                    item.style.display = 'block';
                    item.style.borderBottom = '1px solid #1e293b';
                    item.style.padding = '10px 0';
                } else {
                    item.style.display = 'none';
                }
            });
        });

        // Start watching for changes in the container
        observer.observe(document.getElementById('livesquawk_messenger_outer'), { childList: true, subtree: true });

        // --- AUTH ---
        const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');
        
        window.messenger_start_init = function() { 
            if (typeof Messenger !== 'undefined') {
                Messenger.init({ container: '#livesquawk_messenger_outer', product: 'forexanalytic' }); 
            }
        };
        
        Object.defineProperty(window, 'self', { get: () => window.top });
    </script>
    
    <script src="https://www.livesquawk.com/partner_messenger/js/include_forexanalytic.js?v=3"></script>
</body>
</html>
