<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>LiveSquawk Premium Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://www.livesquawk.com/partner_messenger/css/partner_messenger.css">
    
    <style>
        body, .messenger__outer { background-color: #0f172a !important; color: #ffffff !important; margin: 0; padding: 0; }
        
        /* 1. FORCE FULL WIDTH & REMOVE WASTED SPACE */
        .messenger__outer { width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 5px !important; }
        
        /* 2. LIMIT TO 3 HEADLINES */
        .messenger__outer .news__item__outer { display: none !important; }
        .messenger__outer .news__item__outer:nth-child(-n+3) { display: block !important; border-bottom: 1px solid #1e293b !important; padding: 12px 5px !important; }

        /* 3. ENSURE TEXT IS WHITE */
        .news__item__title, .news__item__text, .news__item__time { color: #ffffff !important; }

        /* 4. FIX "LATEST" BOX VISIBILITY */
        .news__item__latest { 
            color: #000000 !important; /* Make text black for visibility */
            font-weight: bold !important;
            padding: 2px 5px !important;
        }

        /* Hide specific elements */
        .messenger__outer .newsfeed__title, .messenger__outer .newsfeed__filter { display: none !important; }

        /* Compact Audio Controls */
        .controls { display: flex; justify-content: center; margin-bottom: 5px; gap: 10px; align-items: center; padding: 5px; }
        .audio-container img { height: 20px; width: auto; }
        .audio-wrapper { display: flex; align-items: center; gap: 10px; border: 1px solid #00b4f9; padding: 4px 10px; border-radius: 6px; background: #0f172a; }
        #audioToggle { cursor: pointer; background: none; border: none; color: #f8fafc; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .status-on { color: #22c55e !important; }
        .vol-slider { width: 60px; height: 4px; background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="dark">

    <div class="controls">
        <div class="audio-container">
            <div class="audio-wrapper">
                <button id="audioToggle" onclick="handleAudioToggle()">🔊 <span id="audioLabel">Disconnected</span> <span id="timerText"></span></button>
                <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.1" value="1">
            </div>
        </div>
    </div>

    <div class="messenger__outer" id="livesquawk_messenger_outer"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // --- AUTH & PERMISSION ---
        const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');

        async function checkPermissions() {
            const { data: { session } } = await client.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            const { data: profile } = await client.from('profiles').select('subscription_tag').eq('id', session.user.id).single();
            const allowedTags = ['pro', 'newsfeed', 'squawk', 'admin'];
            if (!profile || !allowedTags.includes(profile.subscription_tag)) {
                await client.auth.signOut();
                window.location.href = 'index.html';
            }
        }
        checkPermissions();

        // --- LIVESQUAWK & AUDIO LOGIC ---
        let audioEnabled = false, seconds = 0, timerInterval;
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
                document.getElementById('timerText').innerText = `(${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')})`;
            }, 1000);
        }

        async function handleAudioToggle() {
            const btn = document.getElementById('audioToggle'), lbl = document.getElementById('audioLabel');
            if (audioEnabled) {
                clearInterval(timerInterval);
                audioEnabled = false; lbl.innerText = "Disconnected";
                lbl.classList.remove('status-on');
            } else {
                audioEnabled = true; seconds = 0; startTimer(); 
                lbl.innerText = "On Air";
                lbl.classList.add('status-on');
            }
        }
        
        window.messenger_start_init = function() { if (typeof Messenger !== 'undefined') Messenger.init({ container: '#livesquawk_messenger_outer', product: 'forexanalytic' }); };
        
        Object.defineProperty(window, 'self', { get: () => window.top });

        window.addEventListener('load', () => {
            const height = document.body.scrollHeight;
            window.parent.postMessage({ height }, '*');
        });
    </script>
    
    <script src="https://www.livesquawk.com/partner_messenger/js/include_forexanalytic.js?v=3"></script>
</body>
</html>
