<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="media/favicon.png">
    <title>LiveSquawk Premium Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://www.livesquawk.com/partner_messenger/css/partner_messenger.css">
    
    <style>
        /* Force Dark Theme */
        body, .messenger__outer { background-color: #0f172a !important; color: #ffffff !important; margin: 0; padding: 0; width: 100% !important; }
        
        /* 1. NUKE THE 'LATEST' YELLOW BOX AND TITLES */
        .news__item__latest, 
        .newsfeed__latest, 
        .newsfeed__title, 
        .newsfeed__filter,
        .newsfeed__header { 
            display: none !important; 
            width: 0 !important; 
            height: 0 !important; 
            padding: 0 !important;
            margin: 0 !important;
        }

        /* 2. FORCE FULL WIDTH & REMOVE WASTED SIDE SPACE */
        .messenger__outer { width: 100% !important; max-width: 100% !important; padding: 0 !important; }
        
        /* 3. STRETCH HEADLINES TO FULL WIDTH */
        .messenger__outer .news__item__outer { 
            display: flex !important; 
            width: 100% !important; 
            border-bottom: 1px solid #1e293b !important; 
            padding: 8px 5px !important; 
            flex-direction: row !important;
        }

        /* 4. TEXT STYLING */
        .news__item__title, .news__item__text, .news__item__time { color: #ffffff !important; font-size: 14px !important; }
        .news__item__time { min-width: 50px !important; margin-right: 15px !important; font-family: monospace; }

        /* Audio Controls */
        .controls { display: flex; justify-content: center; margin-bottom: 5px; gap: 10px; align-items: center; padding: 5px; background: #0f172a; }
        .audio-wrapper { display: flex; align-items: center; gap: 10px; border: 1px solid #00b4f9; padding: 4px 10px; border-radius: 6px; }
        #audioToggle { cursor: pointer; background: none; border: none; color: #f8fafc; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .status-on { color: #22c55e !important; }
        .vol-slider { width: 60px; height: 4px; background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="dark">

    <div class="controls">
        <div class="audio-wrapper">
            <button id="audioToggle" onclick="handleAudioToggle()">🔊 <span id="audioLabel">Disconnected</span> <span id="timerText"></span></button>
            <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.1" value="1">
        </div>
    </div>

    <div class="messenger__outer" id="livesquawk_messenger_outer"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // --- AGGRESSIVE DOM CLEANER ---
        setInterval(() => {
            // Remove yellow 'Latest' bar
            const latest = document.querySelectorAll('.news__item__latest, .newsfeed__latest, .newsfeed__title, .newsfeed__header');
            latest.forEach(el => el.remove());
            
            // Limit headlines to 3 by hiding items after the 3rd one
            const items = document.querySelectorAll('.messenger__outer .news__item__outer');
            items.forEach((item, index) => {
                if (index >= 3) item.style.display = 'none';
            });
        }, 100);

        // --- AUTH ---
        const client = supabase.createClient('https://fgidelsazisdqjfckerd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaWRlbHNhemlzZHFqZmNrZXJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk0NzU4NCwiZXhwIjoyMDk4NTIzNTg0fQ.2UkKkgfJ6oERQrp2VOtiL9YP2MXKVWARAdoEkB5YJbY');
        
        async function checkPermissions() {
            const { data: { session } } = await client.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
        }
        checkPermissions();

        // --- LIVESQUAWK LOGIC ---
        let audioEnabled = false, seconds = 0, timerInterval;
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
                document.getElementById('timerText').innerText = `(${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')})`;
            }, 1000);
        }

        async function handleAudioToggle() {
            const btn = document.getElementById('audioToggle'), lbl = document.getElementById('audioLabel');
            if (audioEnabled) {
                clearInterval(timerInterval);
                audioEnabled = false; lbl.innerText = "Disconnected";
                lbl.classList.remove('status-on');
            } else {
                audioEnabled = true; seconds = 0; startTimer(); 
                lbl.innerText = "On Air";
                lbl.classList.add('status-on');
            }
        }
        
        window.messenger_start_init = function() { if (typeof Messenger !== 'undefined') Messenger.init({ container: '#livesquawk_messenger_outer', product: 'forexanalytic' }); };
        
        Object.defineProperty(window, 'self', { get: () => window.top });

        window.addEventListener('load', () => {
            const height = document.body.scrollHeight;
            window.parent.postMessage({ height }, '*');
        });
    </script>
    
    <script src="https://www.livesquawk.com/partner_messenger/js/include_forexanalytic.js?v=3"></script>
</body>
</html>
