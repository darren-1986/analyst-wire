<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LiveSquawk Premium Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        /* Force dark background and remove default margins */
        body { background-color: #0f172a !important; color: #ffffff !important; margin: 0; padding: 0; }

        /* 1. FORCE HIDE THE "LATEST" BADGE AND FEED TITLE */
        /* We use !important to override the external library's style */
        .news__item__latest, 
        .newsfeed__latest, 
        .newsfeed__title, 
        .newsfeed__header { 
            display: none !important; 
        }

        /* 2. LIMIT TO 3 HEADLINES AND STRETCH */
        /* First, hide all items, then show only the first 3 */
        #livesquawk_messenger_outer .news__item__outer { 
            display: none !important; 
        }
        #livesquawk_messenger_outer .news__item__outer:nth-child(-n+3) { 
            display: flex !important; 
            width: 100% !important; 
            border-bottom: 1px solid #1e293b !important; 
            padding: 10px 5px !important; 
        }
        
        /* 3. ENSURE TEXT IS WHITE */
        .news__item__title { color: #ffffff !important; }
    </style>
</head>
<body>

    <div id="livesquawk_messenger_outer"></div>

    <script>
        // --- LIVESQUAWK INIT ---
        window.messenger_start_init = function() { 
            if (typeof Messenger !== 'undefined') {
                Messenger.init({ container: '#livesquawk_messenger_outer', product: 'forexanalytic' }); 
            }
        };

        Object.defineProperty(window, 'self', { get: () => window.top });
    </script>
    
    <script src="https://www.livesquawk.com/partner_messenger/js/include_forexanalytic.js?v=3"></script>
</body>
</html>
